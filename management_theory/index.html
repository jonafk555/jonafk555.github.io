document.addEventListener('DOMContentLoaded', async function() {

  function setStatus(msg) { if (loading) loading.textContent = msg; }

    var p = document.body || document.documentElement;

    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {

    console.error('Bundle unpack error:', err);

holder {\n    border: 0.5pt solid var(--ink);\n    background:\n      repeating-linear-gradient(135deg,\n        transparent 0 6px,\n        rgba(0,0,0,0.08) 6px 7px);\n    display: flex;\n    align-items: center;\n    justify-content: center;\n    font-family: ui-monospace, \"SFMono-Regular\", Menlo, Consolas, monospace;\n    font-size: 8.5pt;\n    color: #444;\n    text-align: center;\n    padding: 6mm;\n    min-height: 30mm;\n  }\n\n  /* opener block (lesson cover page) */\n  .opener {\n    display: flex;\n    flex-direction: column;\n    height: 100%;\n    justify-content: space-between;\n  }\n  .opener .huge {\n    font-family: var(--serif);\n    font-style: italic;\n    font-weight: 400;\n    font-size: 100pt;\n    line-height: 0.92;\n  }\n\n  /* TOC */\n  .toc-row {\n    display: grid;\n    grid-template-columns: 12mm 1fr 12mm;\n    align-items: baseline;\n    gap: 3mm;\n    padding: 1.0mm 0;\n    border-bottom: 0.5pt solid var(--ink);\n    line-height: 1.3;\n  }\n  .toc-row .lp { font-family: var(--serif); font-style: italic; font-size: 11pt; }\n  .toc-row .ti { font-size: 10pt; }\n  .toc-row .pg { font-family: var(--serif); font-style: italic; text-align: right; font-size: 10pt; }\n  .toc-sub {\n    display: grid;\n    grid-template-columns: 12mm 1fr 12mm;\n    padding: 0.3mm 0 0.3mm 0;\n    color: var(--mute);\n    font-size: 9pt;\n    line-height: 1.3;\n  }\n  .toc-sub .ti { padding-left: 4mm; }\n  .toc-sub .pg { text-align: right; font-family: var(--serif); font-style: italic; }\n\n  /* print */\n  @page { size: A4; margin: 0; }\n  @media print {\n    html, body { background: #fff; }\n    .page { margin: 0; box-shadow: none; }\n  }\n<\u002Fstyle>\n<\u002Fhead>\n<body>\n\n\n\n<!-- ============================================== -->\n<!-- 01 · COVER                                     -->\n<!-- ============================================== -->\n<section class=\"page black\" data-screen-label=\"01 Cover\">\n  <div class=\"content\">\n    <div class=\"runner top\" style=\"color:#aaa;\">\n      <span>劉定睿　M11409313<\u002Fspan>\n      <span><em>Textbook · 2026<\u002Fem><\u002Fspan>\n    <\u002Fdiv>\n\n    <div style=\"margin-top: 30mm;\">\n      <div class=\"smallcaps\">管理理論與實務<\u002Fdiv>\n      <h1 style=\"font-size: 56pt; line-height: 1.0; margin-top: 14mm;\">\n        從一個人，<br>\n        到一個組織。\n      <\u002Fh1>\n      <p class=\"serif italic\" style=\"font-size: 18pt; line-height: 1.4; margin-top: 12mm; max-width: 130mm;\">\n        Cognition · Decision · Persuasion · Leadership ·<br>\n        Group · Team · Organization.\n      <\u002Fp>\n    <\u002Fdiv>\n\n    <div class=\"mt-a\">\n      <hr class=\"rule-thin\">\n      <div class=\"between\">\n        <small style=\"color:#aaa;\">A monochrome reader on how people think, choose, and work together.<\u002Fsmall>\n        <small class=\"serif italic\" style=\"color:#fff;\">— i —<\u002Fsmall>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- ============================================== -->\n<!-- 02 · 序：從一個人到組織                          -->\n<!-- ============================================== -->\n<section class=\"page\" data-screen-label=\"02 Foreword\">\n  <div class=\"runner top\">\n    <span>管理理論與實務<\u002Fspan>\n    <span>序章 <em>· Foreword<\u002Fem><\u002Fspan>\n  <\u002Fdiv>\n  <div class=\"content\">\n\n    <div class=\"smallcaps\">Foreword<\u002Fdiv>\n    <h1 style=\"margin-top: 5mm;\">為什麼要讀<br><span class=\"serif italic\">管理理論。<\u002Fspan><\u002Fh1>\n\n    <hr class=\"rule-double\">\n\n    <div class=\"grid cols-2\" style=\"gap: 8mm;\">\n      <div>\n        <h3>理論是降維<\u002Fh3>\n        <p>真實世界決定一個商品價格，可能包含季節、成本、天氣、消費者心理、市場競爭、品牌、行銷、經濟環境—超過 100 個因素。人腦無法同時分析 100 個變數，但可以分析 2 到 3 個。經濟學把這 100 個因素降為兩個：<strong>供給<\u002Fstrong>與<strong>需求<\u002Fstrong>。<\u002Fp>\n        <p>這就是理論的功能：把複雜世界<em class=\"serif\">降維<\u002Fem>到人類可以思考的尺度。Porter 的五力把產業競爭降為五項；Porter 的競爭策略把所有路線降為「低成本」與「差異化」兩種。<\u002Fp>\n\n        <h3>實務是升維<\u002Fh3>\n        <p>但真實世界永遠比理論更複雜。在學校，努力讀書通常會得到好成績；在社會，努力不等於成功，因為現實還涉及人脈、機會、資源、運氣、時機。所以實務是把降維的理論，再放回多維的現實裡—這叫升維。<\u002Fp>\n\n        <blockquote>世界越複雜，<br>管理原則越要簡單。<\u002Fblockquote>\n        <p>台灣公館圓環的機車不靠分析每一台車運作，而是靠一條原則：「頭過身就過」。這是用<em class=\"serif\">簡單規則管理複雜系統<\u002Fem>。<\u002Fp>\n      <\u002Fdiv>\n\n      <div>\n        <h3>知識的三個層次<\u002Fh3>\n        <table>\n          <thead>\n            <tr><th>層次<\u002Fth><th>特性<\u002Fth><th>來源<\u002Fth><\u002Ftr>\n          <\u002Fthead>\n          <tbody>\n            <tr><td>理論 <span class=\"serif italic\">Theory<\u002Fspan><\u002Ftd><td>抽象知識<\u002Ftd><td>學校學習<\u002Ftd><\u002Ftr>\n            <tr><td>知識 <span class=\"serif italic\">Knowledge<\u002Fspan><\u002Ftd><td>系統化理解<\u002Ftd><td>教育與閱讀<\u002Ftd><\u002Ftr>\n            <tr><td>智慧 <span class=\"serif italic\">Wisdom<\u002Fspan><\u002Ftd><td>判斷何時使用理論<\u002Ftd><td>工作經驗<\u002Ftd><\u002Ftr>\n          <\u002Ftbody>\n        <\u002Ftable>\n        <p style=\"margin-top: 3mm;\">研究所剛畢業時，理論最多、薪水最低；隨年資增加，理論會逐漸遺忘，經驗與智慧會增加。<\u002Fp>\n\n        <h3 style=\"margin-top: 7mm;\">這本書的編排<\u002Fh3>\n        <p>七課的順序，是一個人慢慢長大成一個組織的順序：<\u002Fp>\n        <ul class=\"dashed\">\n          <li>一個人怎麼<strong>認知<\u002Fstrong>世界<\u002Fli>\n          <li>一個人怎麼<strong>決策<\u002Fstrong><\u002Fli>\n          <li>一個人怎麼<strong>說服<\u002Fstrong>另一個人<\u002Fli>\n          <li>一個人怎麼<strong>領導<\u002Fstrong>少數人<\u002Fli>\n          <li>少數人怎麼變成<strong>群體<\u002Fstrong><\u002Fli>\n          <li>群體怎麼變成有任務的<strong>團隊<\u002Fstrong><\u002Fli>\n          <li>團隊怎麼結成<strong>組織<\u002Fstrong><\u002Fli>\n        <\u002Ful>\n\n        <h3 style=\"margin-top: 7mm;\">教科書的真正目的<\u002Fh3>\n        <p class=\"serif italic\" style=\"font-size: 12pt; line-height: 1.4;\">不是記住理論，<br>而是學會用理論看世界。<\u002Fp>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <div class=\"mt-a\">\n      <hr class=\"rule-thin\">\n      <div class=\"between\">\n        <small>序章　Foreword<\u002Fsmall>\n        <small class=\"serif italic\">— ii —<\u002Fsmall>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- ============================================== -->\n<!-- 03 · TABLE OF CONTENTS                          -->\n<!-- ============================================== -->\n<section class=\"page\" data-screen-label=\"03 Contents\">\n  <div class=\"runner top\">\n    <span>管理理論與實務<\u002Fspan>\n    <span>目錄 <em>· Contents<\u002Fem><\u002Fspan>\n  <\u002Fdiv>\n  <div class=\"content\">\n\n    <div class=\"smallcaps\">Contents<\u002Fdiv>\n    <h1 style=\"margin-top: 4mm; font-size: 24pt;\">目錄。<\u002Fh1>\n    <hr class=\"rule-double\" style=\"margin: 4mm 0;\">\n\n    <div style=\"margin-top: 0mm;\">\n\n      <div class=\"toc-row\">\n        <div class=\"lp\">i<\u002Fdiv>\n        <div class=\"ti\"><strong>序章<\u002Fstrong>　從一個人到組織<\u002Fdiv>\n        <div class=\"pg\">i<\u002Fdiv>\n      <\u002Fdiv>\n\n      <div class=\"toc-row\" style=\"margin-top: 2mm;\">\n        <div class=\"lp\">I<\u002Fdiv>\n        <div class=\"ti\"><strong>第一課　認知<\u002Fstrong>　<span class=\"serif italic\">認知的事實才是事實<\u002Fspan><\u002Fdiv>\n        <div class=\"pg\">01<\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"toc-sub\"><div><\u002Fdiv><div class=\"ti\">1　認知：當選擇太多時，人如何判斷<\u002Fdiv><div class=\"pg\">02<\u002Fdiv><\u002Fdiv>\n      <div class=\"toc-sub\"><div><\u002Fdiv><div class=\"ti\">2　直覺：非理性的判斷從哪裡來<\u002Fdiv><div class=\"pg\">04<\u002Fdiv><\u002Fdiv>\n      <div class=\"toc-sub\"><div><\u002Fdiv><div class=\"ti\">3　認知型態：用邏輯還是靠直覺行事<\u002Fdiv><div class=\"pg\">05<\u002Fdiv><\u002Fdiv>\n\n      <div class=\"toc-row\">\n        <div class=\"lp\">II<\u002Fdiv>\n        <div class=\"ti\"><strong>第二課　決策<\u002Fstrong>　<span class=\"serif italic\">選擇比努力重要<\u002Fspan><\u002Fdiv>\n        <div class=\"pg\">07<\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"toc-sub\"><div><\u002Fdiv><div class=\"ti\">1　決策：人與猴子差在哪裡<\u002Fdiv><div class=\"pg\">08<\u002Fdiv><\u002Fdiv>\n\n      <div class=\"toc-row\">\n        <div class=\"lp\">III<\u002Fdiv>\n        <div class=\"ti\"><strong>第三課　說服<\u002Fstrong>　<span class=\"serif italic\">影響就是改變想法<\u002Fspan><\u002Fdiv>\n        <div class=\"pg\">10<\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"toc-sub\"><div><\u002Fdiv><div class=\"ti\">1　說故事：求真重要，還是求美重要<\u002Fdiv><div class=\"pg\">11<\u002Fdiv><\u002Fdiv>\n      <div class=\"toc-sub\"><div><\u002Fdiv><div class=\"ti\">2　說服：思辨可能模式為何有效<\u002Fdiv><div class=\"pg\">12<\u002Fdiv><\u002Fdiv>\n      <div class=\"toc-sub\"><div><\u002Fdiv><div class=\"ti\">3　印象管理：做什麼就要像什麼<\u002Fdiv><div class=\"pg\">14<\u002Fdiv><\u002Fdiv>\n\n      <div class=\"toc-row\">\n        <div class=\"lp\">IV<\u002Fdiv>\n        <div class=\"ti\"><strong>第四課　領導與影響力<\u002Fstrong>　<span class=\"serif italic\">領導就是影響力<\u002Fspan><\u002Fdiv>\n        <div class=\"pg\">15<\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"toc-sub\"><div><\u002Fdiv><div class=\"ti\">1　領導：經理人與領導者的差別<\u002Fdiv><div class=\"pg\">16<\u002Fdiv><\u002Fdiv>\n      <div class=\"toc-sub\"><div><\u002Fdiv><div class=\"ti\">2　媒體依賴：影響力如何被放大<\u002Fdiv><div class=\"pg\">18<\u002Fdiv><\u002Fdiv>\n\n      <div class=\"toc-row\">\n        <div class=\"lp\">V<\u002Fdiv>\n        <div class=\"ti\"><strong>第五課　群體<\u002Fstrong>　<span class=\"serif italic\">人多不一定理性<\u002Fspan><\u002Fdiv>\n        <div class=\"pg\">20<\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"toc-sub\"><div><\u002Fdiv><div class=\"ti\">1　社會資本：社群如何運作<\u002Fdiv><div class=\"pg\">21<\u002Fdiv><\u002Fdiv>\n      <div class=\"toc-sub\"><div><\u002Fdiv><div class=\"ti\">2　沉默螺旋：主流意見如何形成<\u002Fdiv><div class=\"pg\">22<\u002Fdiv><\u002Fdiv>\n      <div class=\"toc-sub\"><div><\u002Fdiv><div class=\"ti\">3　群體迷思與極化：為什麼大家還是要開會<\u002Fdiv><div class=\"pg\">24<\u002Fdiv><\u002Fdiv>\n\n      <div class=\"toc-row\">\n        <div class=\"lp\">VI<\u002Fdiv>\n        <div class=\"ti\"><strong>第六課　團隊<\u002Fstrong>　<span class=\"serif italic\">團隊靠互動，不靠人數<\u002Fspan><\u002Fdiv>\n        <div class=\"pg\">25<\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"toc-sub\"><div><\u002Fdiv><div class=\"ti\">1　公平：理性與感性哪個比較重要<\u002Fdiv><div class=\"pg\">26<\u002Fdiv><\u002Fdiv>\n      <div class=\"toc-sub\"><div><\u002Fdiv><div class=\"ti\">2　群體動力：團隊發展五個階段<\u002Fdiv><div class=\"pg\">27<\u002Fdiv><\u002Fdiv>\n      <div class=\"toc-sub\"><div><\u002Fdiv><div class=\"ti\">3　社會抉擇：群體合作的困難<\u002Fdiv><div class=\"pg\">28<\u002Fdiv><\u002Fdiv>\n\n      <div class=\"toc-row\">\n        <div class=\"lp\">VII<\u002Fdiv>\n        <div class=\"ti\"><strong>第七課　組織<\u002Fstrong>　<span class=\"serif italic\">制度，決定行為<\u002Fspan><\u002Fdiv>\n        <div class=\"pg\">30<\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"toc-sub\"><div><\u002Fdiv><div class=\"ti\">— AI 時代的組織與社會惰化（依筆記）<\u002Fdiv><div class=\"pg\">31<\u002Fdiv><\u002Fdiv>\n\n      <div class=\"toc-row\">\n        <div class=\"lp\">★<\u002Fdiv>\n        <div class=\"ti\"><strong>總論<\u002Fstrong>　從一個人到組織的演變<\u002Fdiv>\n        <div class=\"pg\">33<\u002Fdiv>\n      <\u002Fdiv>\n\n    <\u002Fdiv>\n\n    <div class=\"mt-a\">\n      <hr class=\"rule-thin\">\n      <div class=\"between\">\n        <small>目錄　Contents　·　大綱中無筆記支撐的子題已依約定省略<\u002Fsmall>\n        <small class=\"serif italic\">— iii —<\u002Fsmall>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- ============================================== -->\n<!-- LESSON I · 認知                                 -->\n<!-- ============================================== -->\n<section class=\"page black\" data-screen-label=\"L1 認知 opener\">\n  <div class=\"runner top\" style=\"color:#aaa;\">\n    <span>劉定睿　M11409313<\u002Fspan>\n    <span><em>Lesson I · Cognition<\u002Fem><\u002Fspan>\n  <\u002Fdiv>\n  <div class=\"content\">\n    <div class=\"opener\">\n      <div>\n        <div class=\"smallcaps\" style=\"color:#aaa;\">Lesson<\u002Fdiv>\n        <div class=\"huge\">I.<\u002Fdiv>\n      <\u002Fdiv>\n      <div>\n        <h1 style=\"font-size: 44pt; line-height:1.0;\">認知<span class=\"serif italic\" style=\"font-weight:400;\">.<\u002Fspan><\u002Fh1>\n        <p class=\"serif italic\" style=\"font-size: 22pt; line-height:1.3; margin-top:8mm; max-width:140mm;\">\n          認知的事實，<br>才是事實。\n        <\u002Fp>\n        <p style=\"margin-top: 14mm; max-width: 140mm; color:#ccc;\">\n          人類在某些能力上不如機器：記憶力差、計算能力差、容易疲勞。但人類有一種機器沒有的東西—創意。這一課要先承認自己的限制，再看清楚這些限制如何左右我們對世界的判斷。\n        <\u002Fp>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"mt-a\">\n      <hr class=\"rule-thin\">\n      <div class=\"between\">\n        <small style=\"color:#aaa;\">三節 · §1 注意力與選擇　§2 直覺與故事　§3 認知型態<\u002Fsmall>\n        <small class=\"serif italic\" style=\"color:#fff;\">— 01 —<\u002Fsmall>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<section class=\"page\" data-screen-label=\"L1.1 認知與注意力\">\n  <div class=\"runner top\">\n    <span><em>Lesson I · Cognition<\u002Fem><\u002Fspan>\n    <span>§ 1　注意力與選擇<\u002Fspan>\n  <\u002Fdiv>\n  <div class=\"content\">\n\n    <div class=\"smallcaps\">§ 1<\u002Fdiv>\n    <h2 style=\"margin-top: 3mm;\">認知：<span class=\"serif italic\">當選擇太多時，人如何判斷。<\u002Fspan><\u002Fh2>\n\n    <hr class=\"rule-double\">\n\n    <div class=\"grid cols-2\" style=\"gap: 7mm;\">\n      <div>\n        <h3>從一場果醬實驗開始<\u002Fh3>\n        <p>研究者在超市設置兩個攤位：一攤提供 36 種口味的果醬，另一攤只有 6 種。提供 36 種選擇的攤位看的人多，但實際購買的人少；提供 6 種選擇的攤位看的人少，但購買決策迅速、成交率高。<\u002Fp>\n        <p>這個實驗指出當代社會的真正問題：問題不再是「<em class=\"serif\">是否有選擇<\u002Fem>」，而是「<em class=\"serif\">如何選擇<\u002Fem>」。Spotify 有數百萬首歌，網路上有近乎無限的資訊—但人的判斷力沒有跟著變多。<\u002Fp>\n\n        <h3>注意力是稀缺資源<\u002Fh3>\n        <p>在資訊爆炸的時代，競爭的核心不是內容本身，而是<strong>消費者的注意力<\u002Fstrong>。短影音為什麼是 30 秒到 1 分鐘？因為這是人類能集中注意力的長度。一個人可以花一小時看三十到六十個短影片，但之後幾乎記不得任何一個的內容。<\u002Fp>\n\n        <blockquote>真正重要的是：是否被看到、是否影響判斷、是否被記住。<\u002Fblockquote>\n      <\u002Fdiv>\n\n      <div>\n        <h3>注意力的三個特性<\u002Fh3>\n\n        <h4 style=\"margin-top: 2mm;\">一　有機會成本<\u002Fh4>\n        <p>當你把注意力放在一件事，就無法同時放在另一件。上課時就不能看短影音；開車時不應該追劇。<\u002Fp>\n\n        <h4>二　有上限<\u002Fh4>\n        <p>每個人每天都只有 24 小時。注意力是有限資源，無法靠努力擴張。<\u002Fp>\n\n        <h4>三　有缺口<\u002Fh4>\n        <p>有些時間注意力是閒置的—搭捷運、等紅燈、排隊。許多短影音平台的商業模式，就是在搶這些「<em class=\"serif\">注意力缺口<\u002Fem>」。<\u002Fp>\n\n        <div class=\"box\" style=\"margin-top: 5mm;\">\n          <h4 style=\"margin:0 0 2mm 0;\">本節要記住的<\u002Fh4>\n          <ul class=\"dashed\" style=\"margin: 0;\">\n            <li>選擇過多會降低決策品質。<\u002Fli>\n            <li>注意力是新時代的稀缺資源。<\u002Fli>\n            <li>行銷的本質：搶注意力，不是搶內容。<\u002Fli>\n          <\u002Ful>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <div class=\"mt-a\">\n      <hr class=\"rule-thin\">\n      <div class=\"between\">\n        <small>第一課　認知　·　§1 注意力與選擇<\u002Fsmall>\n        <small class=\"serif italic\">— 02 —<\u002Fsmall>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<section class=\"page\" data-screen-label=\"L1.2 直覺與故事\">\n  <div class=\"runner top\">\n    <span><em>Lesson I · Cognition<\u002Fem><\u002Fspan>\n    <span>§ 2　直覺與故事<\u002Fspan>\n  <\u002Fdiv>\n  <div class=\"content\">\n\n    <div class=\"smallcaps\">§ 2<\u002Fdiv>\n    <h2 style=\"margin-top: 3mm;\">直覺：<span class=\"serif italic\">非理性的判斷從哪裡來。<\u002Fspan><\u002Fh2>\n\n    <hr class=\"rule-double\">\n\n    <div class=\"grid cols-2\" style=\"gap: 7mm;\">\n      <div>\n        <h3>人類的記憶與故事<\u002Fh3>\n        <p>學生聽創業家演講，當場做了很多筆記；但一週後回憶，記得的往往不是創業理論，而是「<em class=\"serif\">創業家當場哭了三次<\u002Fem>」。<\u002Fp>\n        <p>這顯示一個事實：人類的記憶不是用條列式儲存的，而是用<strong>故事<\u002Fstrong>儲存的。抽象概念難留存，情緒化的情節留得久。<\u002Fp>\n\n        <h3>情緒感染<\u002Fh3>\n        <p>在網路行銷中有個概念叫<em class=\"serif\">情緒感染（emotional contagion）<\u002Fem>—能引起情緒的內容，比中性內容更容易被傳播。這也是為什麼網路上聲量最大的，往往不是最正確的論點，而是最會「動人」的論點。<\u002Fp>\n\n        <blockquote>抽象概念輸給故事，<br>邏輯輸給情緒。<\u002Fblockquote>\n        <p>這不是道德判斷，而是人腦的設計事實。任何想要說服、教學、行銷的人，都必須先承認這件事，再決定要怎麼用它。<\u002Fp>\n      <\u002Fdiv>\n\n      <div>\n        <h3>人腦 vs 電腦<\u002Fh3>\n        <table>\n          <thead>\n            <tr><th><\u002Fth><th>人腦<\u002Fth><th>電腦<\u002Fth><\u002Ftr>\n          <\u002Fthead>\n          <tbody>\n            <tr><td>創意<\u002Ftd><td>有<\u002Ftd><td>沒有<\u002Ftd><\u002Ftr>\n            <tr><td>記憶<\u002Ftd><td>弱、易忘<\u002Ftd><td>強、準確<\u002Ftd><\u002Ftr>\n            <tr><td>計算<\u002Ftd><td>慢<\u002Ftd><td>快<\u002Ftd><\u002Ftr>\n            <tr><td>疲勞<\u002Ftd><td>會<\u002Ftd><td>不會<\u002Ftd><\u002Ftr>\n            <tr><td>故事感<\u002Ftd><td>強<\u002Ftd><td>無<\u002Ftd><\u002Ftr>\n          <\u002Ftbody>\n        <\u002Ftable>\n        <p style=\"margin-top: 3mm;\">兩者結合，能力會比單獨任何一方更強。<\u002Fp>\n\n        <h3 style=\"margin-top: 7mm;\">深度學習與人類學語言<\u002Fh3>\n        <p>傳統學語言靠文法：「動詞＋名詞」可以變成「把名詞動詞掉」—吃飯變把飯吃掉、關燈變把燈關掉。可是「讀書」並不能變成「把書讀掉」。文法永遠有例外。<\u002Fp>\n        <p>真正會語言的人不是背文法，而是<strong>在語言環境中生活<\u002Fstrong>—有個美國男朋友，三個月後就會用英文吵架。深度學習也採取類似的思路：不先定義規則，而是從大量資料中自動找出特徵。<\u002Fp>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <div class=\"mt-a\">\n      <hr class=\"rule-thin\">\n      <div class=\"between\">\n        <small>第一課　認知　·　§2 直覺與故事<\u002Fsmall>\n        <small class=\"serif italic\">— 03 —<\u002Fsmall>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<section class=\"page\" data-screen-label=\"L1.3 認知型態\">\n  <div class=\"runner top\">\n    <span><em>Lesson I · Cognition<\u002Fem><\u002Fspan>\n    <span>§ 3　認知型態<\u002Fspan>\n  <\u002Fdiv>\n  <div class=\"content\">\n\n    <div class=\"smallcaps\">§ 3<\u002Fdiv>\n    <h2 style=\"margin-top: 3mm;\">認知型態：<span class=\"serif italic\">用邏輯，還是靠直覺行事。<\u002Fspan><\u002Fh2>\n\n    <hr class=\"rule-double\">\n\n    <div class=\"grid cols-2\" style=\"gap: 7mm;\">\n      <div>\n        <h3>先天 × 後天 × 環境<\u002Fh3>\n        <p>認知風格不是單一來源—先天的生理結構、後天的教育訓練、職涯經驗與環境壓力共同塑造它。每個人都有一個<strong>主要風格<\u002Fstrong>與一個<strong>備用風格<\u002Fstrong>。<\u002Fp>\n        <p>結論：認知風格<em class=\"serif\">可塑，但有慣性<\u002Fem>。<\u002Fp>\n\n        <h3>左腦 vs 右腦的時代問題<\u002Fh3>\n        <p>傳統教育體系高度偏重左腦能力—邏輯、語言、分析。但這正是 AI 最先取代的範圍。未來真正稀缺的，反而是右腦能力：創意、想像、人際。<\u002Fp>\n\n        <h3>兩種教育哲學<\u002Fh3>\n        <ul class=\"dashed\">\n          <li><strong>因材施教<\u002Fstrong>：強化個人優勢。專業深度高、適應性低。<\u002Fli>\n          <li><strong>全人發展<\u002Fstrong>：補強弱項、跨領域。適應力高、成本與壓力大。<\u002Fli>\n        <\u002Ful>\n        <p>採用哪一種，往往取決於「<em class=\"serif\">回報是否值得<\u002Fem>」—這就是社會交換理論的應用。<\u002Fp>\n      <\u002Fdiv>\n\n      <div>\n        <h3>四種認知型態<\u002Fh3>\n        <table>\n          <thead>\n            <tr><th>類型<\u002Fth><th>特徵<\u002Fth><th>溝通方式<\u002Fth><\u002Ftr>\n          <\u002Fthead>\n          <tbody>\n            <tr><td>指導型 <span class=\"serif italic\">Directive<\u002Fspan><\u002Ftd><td>強勢、效率導向、討厭廢話<\u002Ftd><td>直接講結論<\u002Ftd><\u002Ftr>\n            <tr><td>分析型 <span class=\"serif italic\">Analytical<\u002Fspan><\u002Ftd><td>理性、重數據、謹慎<\u002Ftd><td>提供完整資訊<\u002Ftd><\u002Ftr>\n            <tr><td>概念型 <span class=\"serif italic\">Conceptual<\u002Fspan><\u002Ftd><td>創意、願景導向<\u002Ftd><td>強調創新與未來<\u002Ftd><\u002Ftr>\n            <tr><td>行為型 <span class=\"serif italic\">Behavioral<\u002Fspan><\u002Ftd><td>重人際、情感導向<\u002Ftd><td>建立關係、關懷<\u002Ftd><\u002Ftr>\n          <\u002Ftbody>\n        <\u002Ftable>\n        <p style=\"margin-top: 3mm;\">沒有人是純粹單一型態，每個人都是<strong>不同比例的混合<\u002Fstrong>。實務上的關鍵能力，是判斷對方的<em class=\"serif\">主導風格<\u002Fem>—也就是俗稱的「見人說人話」。<\u002Fp>\n\n        <h3>職業會塑造思維<\u002Fh3>\n        <p>業務有業務思維、醫生有醫療思維、軍人有紀律思維。長期的職涯會固化認知風格，這也是為什麼好工程師升任主管常常失敗—兩種職務需要不同的腦。解法不是強迫轉型，而是<strong>雙軌制度<\u002Fstrong>：技術職與管理職各自有升遷路徑。<\u002Fp>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <div class=\"mt-a\">\n      <hr class=\"rule-thin\">\n      <div class=\"between\">\n        <small>第一課　認知　·　§3 認知型態<\u002Fsmall>\n        <small class=\"serif italic\">— 04 —<\u002Fsmall>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<section class=\"page\" data-screen-label=\"L1 closing\">\n  <div class=\"runner top\">\n    <span><em>Lesson I · Cognition<\u002Fem><\u002Fspan>\n    <span>本課收束<\u002Fspan>\n  <\u002Fdiv>\n  <div class=\"content\">\n\n    <div class=\"smallcaps\">Closing of Lesson I<\u002Fdiv>\n    <h2 style=\"margin-top: 3mm;\">本課收束。<\u002Fh2>\n\n    <hr class=\"rule-double\">\n\n    <div class=\"grid cols-2\" style=\"gap: 8mm;\">\n      <div>\n        <h3>三個值得記住的句子<\u002Fh3>\n        <blockquote>\n          人類的能力差，<br>\n          可是人類有創意。\n        <\u002Fblockquote>\n        <blockquote>\n          注意力是新時代的<br>稀缺資源。\n        <\u002Fblockquote>\n        <blockquote>\n          沒有人是單一型態，<br>只有比例不同的混合。\n        <\u002Fblockquote>\n      <\u002Fdiv>\n\n      <div>\n        <h3>反方論點　<small>devil's advocate<\u002Fsmall><\u002Fh3>\n        <p>—　如果故事比邏輯更容易被記住，那麼一本「強調故事」的教科書，是不是也很容易把錯誤的觀點傳播出去？<\u002Fp>\n        <p>—　四種認知型態的分類本身，是不是另一種「簡化」？真實的人並不能被歸入四個方格。<\u002Fp>\n        <p>—　全人發展與因材施教的取捨，是否其實是「<em class=\"serif\">誰來付這個成本<\u002Fem>」的政治問題，而不是教育問題？<\u002Fp>\n\n        <h3 style=\"margin-top: 6mm;\">本課與下一課的連結<\u002Fh3>\n        <p>第一課討論的是「人怎麼<em class=\"serif\">看到<\u002Fem>世界」，下一課討論的是—在看到世界之後，<strong>人怎麼做選擇<\u002Fstrong>。<\u002Fp>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <div class=\"mt-a\">\n      <hr class=\"rule-thin\">\n      <div class=\"between\">\n        <small>第一課　認知　·　收束<\u002Fsmall>\n        <small class=\"serif italic\">— 05 —<\u002Fsmall>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- ============================================== -->\n<!-- LESSON II · 決策                                -->\n<!-- ============================================== -->\n<section class=\"page black\" data-screen-label=\"L2 決策 opener\">\n  <div class=\"runner top\" style=\"color:#aaa;\">\n    <span>劉定睿　M11409313<\u002Fspan>\n    <span><em>Lesson II · Decision<\u002Fem><\u002Fspan>\n  <\u002Fdiv>\n  <div class=\"content\">\n    <div class=\"opener\">\n      <div>\n        <div class=\"smallcaps\" style=\"color:#aaa;\">Lesson<\u002Fdiv>\n        <div class=\"huge\">II.<\u002Fdiv>\n      <\u002Fdiv>\n      <div>\n        <h1 style=\"font-size: 44pt; line-height:1.0;\">決策<span class=\"serif italic\" style=\"font-weight:400;\">.<\u002Fspan><\u002Fh1>\n        <p class=\"serif italic\" style=\"font-size: 22pt; line-height:1.3; margin-top:8mm; max-width:140mm;\">\n          選擇比努力<br>重要。\n        <\u002Fp>\n        <p style=\"margin-top: 14mm; max-width: 140mm; color:#ccc;\">\n          人生最常被誤會的是：以為自己在求「最佳解」。事實上，人類大部分時候連最佳解都不知道長什麼樣子；我們真正能做的，是在資訊不全的情況下，做出「夠好」的決定。\n        <\u002Fp>\n        <p style=\"color:#888; margin-top: 8mm; max-width: 140mm; font-size: 9pt;\">\n          ※ 本課僅含「決策」一節；大綱中之衡量、主觀機率、前景理論於提供之筆記中無對應材料，依約定省略。\n        <\u002Fp>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"mt-a\">\n      <hr class=\"rule-thin\">\n      <div class=\"between\">\n        <small style=\"color:#aaa;\">一節 · §1 期望值與滿意解<\u002Fsmall>\n        <small class=\"serif italic\" style=\"color:#fff;\">— 06 —<\u002Fsmall>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<section class=\"page\" data-screen-label=\"L2.1 決策理論\">\n  <div class=\"runner top\">\n    <span><em>Lesson II · Decision<\u002Fem><\u002Fspan>\n    <span>§ 1　期望值與滿意解<\u002Fspan>\n  <\u002Fdiv>\n  <div class=\"content\">\n\n    <div class=\"smallcaps\">§ 1<\u002Fdiv>\n    <h2 style=\"margin-top: 3mm;\">決策：<span class=\"serif italic\">人與猴子，差在哪裡。<\u002Fspan><\u002Fh2>\n\n    <hr class=\"rule-double\">\n\n    <div class=\"grid cols-2\" style=\"gap: 7mm;\">\n      <div>\n        <h3>傳統模型：期望值<\u002Fh3>\n        <p>古典決策理論的核心非常簡潔：<\u002Fp>\n        <div class=\"box\" style=\"text-align:center; padding: 5mm 0;\">\n          <span class=\"serif italic\" style=\"font-size: 15pt;\">期望值 ＝ 機率 × 價值<\u002Fspan>\n        <\u002Fdiv>\n        <p style=\"margin-top: 3mm;\">這個公式假設兩件事：（一）機率是已知的；（二）你會經歷大量重複的試驗，所以平均值有意義。<\u002Fp>\n\n        <h3>但現實是 One-time Event<\u002Fh3>\n        <p>真實人生大多是<strong>單次事件<\u002Fstrong>：是否錄取、是否成功、是否下雨。對你個人來說，這些事不會發生 100 次。<\u002Fp>\n        <p class=\"serif italic\" style=\"font-size: 11.5pt; line-height: 1.45; margin-top: 2mm;\">降雨機率 80% 不是預測「今天會不會下雨」，而是說明「長期 10 次中有 8 次會下雨」。今天到底會不會下，並不確定。<\u002Fp>\n\n        <blockquote>機率 ≠ 預測個體結果。<\u002Fblockquote>\n\n        <h3>統計學 vs 管理學<\u002Fh3>\n        <table>\n          <thead><tr><th>領域<\u002Fth><th>關注<\u002Fth><\u002Ftr><\u002Fthead>\n          <tbody>\n            <tr><td>統計學<\u002Ftd><td>大樣本的平均行為<\u002Ftd><\u002Ftr>\n            <tr><td>管理學<\u002Ftd><td>個體在單次事件下的決策<\u002Ftd><\u002Ftr>\n          <\u002Ftbody>\n        <\u002Ftable>\n      <\u002Fdiv>\n\n      <div>\n        <h3>兩種決策邏輯<\u002Fh3>\n\n        <h4 style=\"margin-top: 2mm;\">一　最佳解 <span class=\"serif italic\">Optimization<\u002Fspan><\u002Fh4>\n        <p>假設你擁有完整資訊、可以計算所有可能性。這是教科書的理想模型，現實中極少存在。<\u002Fp>\n\n        <h4>二　滿意解 <span class=\"serif italic\">Satisficing<\u002Fspan><\u002Fh4>\n        <p>承認資訊不全、運算有限。重點不是找出最好，而是找出「<em class=\"serif\">足夠好<\u002Fem>」並且可以接受的選項。<\u002Fp>\n\n        <div class=\"box solid\" style=\"margin-top: 4mm;\">\n          <h4 style=\"margin:0 0 2mm 0;\">本課的核心結論<\u002Fh4>\n          <p style=\"margin:0;\" class=\"serif italic\">人生無法求最佳解，只能在有限資訊下做可接受的決策。<\u002Fp>\n        <\u002Fdiv>\n\n        <h3 style=\"margin-top: 7mm;\">那麼，人與猴子差在哪？<\u002Fh3>\n        <p>差別不在於「誰算得比較準」—猴子算不出期望值，但人也算不出真實世界的期望值。差別在於：<\u002Fp>\n        <ul class=\"dashed\">\n          <li>人會問「<em class=\"serif\">這個選項夠不夠好<\u002Fem>」，而不只是「<em class=\"serif\">好不好吃<\u002Fem>」。<\u002Fli>\n          <li>人會考慮未來、考慮他人、考慮意義。<\u002Fli>\n          <li>人會在沒有獎勵的情況下，仍然做出選擇。<\u002Fli>\n        <\u002Ful>\n        <p>這也是為什麼本書要從「認知」開始講起—因為人類的決策，本質上是被認知，而不是被算術所決定。<\u002Fp>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <div class=\"mt-a\">\n      <hr class=\"rule-thin\">\n      <div class=\"between\">\n        <small>第二課　決策　·　§1 期望值與滿意解<\u002Fsmall>\n        <small class=\"serif italic\">— 07 —<\u002Fsmall>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- ============================================== -->\n<!-- LESSON III · 說服                               -->\n<!-- ============================================== -->\n<section class=\"page black\" data-screen-label=\"L3 說服 opener\">\n  <div class=\"runner top\" style=\"color:#aaa;\">\n    <span>劉定睿　M11409313<\u002Fspan>\n    <span><em>Lesson III · Persuasion<\u002Fem><\u002Fspan>\n  <\u002Fdiv>\n  <div class=\"content\">\n    <div class=\"opener\">\n      <div>\n        <div class=\"smallcaps\" style=\"color:#aaa;\">Lesson<\u002Fdiv>\n        <div class=\"huge\">III.<\u002Fdiv>\n      <\u002Fdiv>\n      <div>\n        <h1 style=\"font-size: 44pt; line-height:1.0;\">說服<span class=\"serif italic\" style=\"font-weight:400;\">.<\u002Fspan><\u002Fh1>\n        <p class=\"serif italic\" style=\"font-size: 22pt; line-height:1.3; margin-top:8mm; max-width:140mm;\">\n          影響，<br>就是改變想法。\n        <\u002Fp>\n        <p style=\"margin-top: 14mm; max-width: 140mm; color:#ccc;\">\n          幾乎所有管理活動都涉及說服：老師說服學生、業務說服客戶、主管說服員工、員工說服主管。說服不是技巧，是普遍能力—但它沒有單一最佳解。\n        <\u002Fp>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"mt-a\">\n      <hr class=\"rule-thin\">\n      <div class=\"between\">\n        <small style=\"color:#aaa;\">三節 · §1 說故事　§2 ELM 模型　§3 印象管理<\u002Fsmall>\n        <small class=\"serif italic\" style=\"color:#fff;\">— 08 —<\u002Fsmall>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<section class=\"page\" data-screen-label=\"L3.1 說故事\">\n  <div class=\"runner top\">\n    <span><em>Lesson III · Persuasion<\u002Fem><\u002Fspan>\n    <span>§ 1　說故事<\u002Fspan>\n  <\u002Fdiv>\n  <div class=\"content\">\n\n    <div class=\"smallcaps\">§ 1<\u002Fdiv>\n    <h2 style=\"margin-top: 3mm;\">說故事：<span class=\"serif italic\">求真重要，還是求美重要。<\u002Fspan><\u002Fh2>\n\n    <hr class=\"rule-double\">\n\n    <div class=\"grid cols-2\" style=\"gap: 7mm;\">\n      <div>\n        <h3>說服的三個層次<\u002Fh3>\n        <p>說服的本質是改變他人，改變的對象可以分成三層：<\u002Fp>\n        <ul class=\"dashed\">\n          <li><strong>信念<\u002Fstrong>（Belief）—對事實的認知<\u002Fli>\n          <li><strong>態度<\u002Fstrong>（Attitude）—情感與評價<\u002Fli>\n          <li><strong>行為<\u002Fstrong>（Behavior）—實際決策與行動<\u002Fli>\n        <\u002Ful>\n        <p>例如：讓人相信氣候正在變遷（信念）、覺得環保重要（態度）、實際減少碳排（行為）—三層之間有距離，知道並不等於做。<\u002Fp>\n\n        <h3>亞里斯多德的三要素<\u002Fh3>\n        <p>古典說服理論將說服拆成三個構面：<\u002Fp>\n        <table>\n          <tbody>\n            <tr><td><span class=\"serif italic\">Logos<\u002Fspan>　訊息內容<\u002Ftd><td>邏輯與論證<\u002Ftd><\u002Ftr>\n            <tr><td><span class=\"serif italic\">Ethos<\u002Fspan>　訊息來源<\u002Ftd><td>說話者的可信度<\u002Ftd><\u002Ftr>\n            <tr><td><span class=\"serif italic\">Pathos<\u002Fspan>　聽眾情緒<\u002Ftd><td>對方當下的情感狀態<\u002Ftd><\u002Ftr>\n          <\u002Ftbody>\n        <\u002Ftable>\n      <\u002Fdiv>\n\n      <div>\n        <h3>三要素的限制<\u002Fh3>\n        <p>古典模型解釋力有限：<\u002Fp>\n        <ul class=\"dashed\">\n          <li>沒有邏輯內容的政治口號，仍可能成功說服。<\u002Fli>\n          <li>非權威人物如網紅，也可能具有影響力。<\u002Fli>\n          <li>情緒不佳的人，仍可能被制度性說服（例如法院判決）。<\u002Fli>\n        <\u002Ful>\n        <p>因此三要素只是部分解釋框架，<strong>不是充分條件<\u002Fstrong>。<\u002Fp>\n\n        <blockquote>\n          A 方法有效，<br>\n          B 方法也有效，<br>\n          關鍵在於「情境」。\n        <\u002Fblockquote>\n        <p>這是現代說服理論的核心。問題不是「應該用邏輯還是情感」，而是「<em class=\"serif\">什麼情境下用哪一種<\u002Fem>」。<\u002Fp>\n\n        <h3>求真 vs 求美<\u002Fh3>\n        <p>真實的論點不一定動人；動人的論點不一定真實。一個好的說服者，不會選邊站—而是在不同情境下，選擇不同的工具。<\u002Fp>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <div class=\"mt-a\">\n      <hr class=\"rule-thin\">\n      <div class=\"between\">\n        <small>第三課　說服　·　§1 說故事<\u002Fsmall>\n        <small class=\"serif italic\">— 09 —<\u002Fsmall>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<section class=\"page\" data-screen-label=\"L3.2 ELM\">\n  <div class=\"runner top\">\n    <span><em>Lesson III · Persuasion<\u002Fem><\u002Fspan>\n    <span>§ 2　ELM 模型<\u002Fspan>\n  <\u002Fdiv>\n  <div class=\"content\">\n\n    <div class=\"smallcaps\">§ 2<\u002Fdiv>\n    <h2 style=\"margin-top: 3mm;\">說服：<span class=\"serif italic\">思辨可能模式為何有效。<\u002Fspan><\u002Fh2>\n\n    <hr class=\"rule-double\">\n\n    <div class=\"grid cols-2\" style=\"gap: 7mm;\">\n      <div>\n        <h3>兩條說服路徑<\u002Fh3>\n\n        <h4 style=\"margin-top: 2mm;\">中央路徑　<span class=\"serif italic\">Central Route<\u002Fspan><\u002Fh4>\n        <p>基於理性與邏輯。對方會深度思考、仔細評估資訊。條件是<strong>高動機<\u002Fstrong>＋<strong>高能力<\u002Fstrong>。適用情境：買房、投資、職涯決策、高知識群體。效果<em class=\"serif\">持久且穩定<\u002Fem>。<\u002Fp>\n\n        <h4>邊緣路徑　<span class=\"serif italic\">Peripheral Route<\u002Fspan><\u002Fh4>\n        <p>基於情感與直覺。對方不會深入思考，而是用簡化線索（heuristics）—名人代言、故事敘事、情緒感染。條件是<strong>低動機 或 低能力<\u002Fstrong>。效果<em class=\"serif\">快速但短期<\u002Fem>。<\u002Fp>\n\n        <h3>判斷標準：動機 × 能力<\u002Fh3>\n        <table>\n          <thead><tr><th>條件<\u002Fth><th>路徑<\u002Fth><th>策略<\u002Fth><\u002Ftr><\u002Fthead>\n          <tbody>\n            <tr><td>高動機＋高能力<\u002Ftd><td>中央<\u002Ftd><td>數據、邏輯、分析<\u002Ftd><\u002Ftr>\n            <tr><td>低動機 或 低能力<\u002Ftd><td>邊緣<\u002Ftd><td>情緒、故事、形象<\u002Ftd><\u002Ftr>\n          <\u002Ftbody>\n        <\u002Ftable>\n      <\u002Fdiv>\n\n      <div>\n        <h3>實務應用<\u002Fh3>\n\n        <h4 style=\"margin-top: 2mm;\">企業變革<\u002Fh4>\n        <p>員工還沒有動機接受變革時，理性簡報無效—需要先用故事與願景激發動機；員工已經接受方向後，再用數據與分析鞏固決定。<\u002Fp>\n\n        <h4>學校招生<\u002Fh4>\n        <p>高中生 → 用夢想與故事（邊緣路徑）；研究生 → 用就業率與數據（中央路徑）。<\u002Fp>\n\n        <h4>政治與群眾動員<\u002Fh4>\n        <p>群眾大多是低涉入狀態，所以政治語言常見高情緒、低邏輯—這不是缺陷，是配合對象的策略選擇。<\u002Fp>\n\n        <h3>設計原則<\u002Fh3>\n        <ol>\n          <li>不要先選方法，要先判斷受眾。<\u002Fli>\n          <li>典型流程：邊緣路徑提升動機 → 中央路徑強化決策。<\u002Fli>\n          <li>單面訊息對已同意者有效；雙面論證對反對者有效。<\u002Fli>\n          <li>適度重複可強化記憶，<strong>過度重複<\u002Fstrong>會反感。<\u002Fli>\n          <li>名人代言短期有效；長期可能失效（sleeping effect）。<\u002Fli>\n        <\u002Fol>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <div class=\"mt-a\">\n      <hr class=\"rule-thin\">\n      <div class=\"between\">\n        <small>第三課　說服　·　§2 ELM 模型<\u002Fsmall>\n        <small class=\"serif italic\">— 10 —<\u002Fsmall>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<section class=\"page\" data-screen-label=\"L3.3 印象管理\">\n  <div class=\"runner top\">\n    <span><em>Lesson III · Persuasion<\u002Fem><\u002Fspan>\n    <span>§ 3　印象管理<\u002Fspan>\n  <\u002Fdiv>\n  <div class=\"content\">\n\n    <div class=\"smallcaps\">§ 3<\u002Fdiv>\n    <h2 style=\"margin-top: 3mm;\">印象管理：<span class=\"serif italic\">做什麼，就要像什麼。<\u002Fspan><\u002Fh2>\n\n    <hr class=\"rule-double\">\n\n    <div class=\"grid cols-2\" style=\"gap: 7mm;\">\n      <div>\n        <h3>說服不只內容，也包含呈現<\u002Fh3>\n        <p>說服力來自整體—除了你說了什麼，也包含<strong>怎麼說、誰來說、在哪裡說<\u002Fstrong>。印象管理是這個整體的策略。<\u002Fp>\n        <ul class=\"dashed\">\n          <li>說話風格<\u002Fli>\n          <li>角色定位<\u002Fli>\n          <li>故事敘事<\u002Fli>\n          <li>視覺與情境<\u002Fli>\n        <\u002Ful>\n\n        <h3>社會即舞台<\u002Fh3>\n        <p>戲劇理論認為：社會是一個舞台，每個人都在演自己想被看見的角色。一個工程師走進客戶會議，西裝會帶來信任；穿涼鞋會帶來懷疑—即使他講的內容一模一樣。<\u002Fp>\n      <\u002Fdiv>\n\n      <div>\n        <h3>形象與行為的雙向作用<\u002Fh3>\n        <p>更重要的是—<em class=\"serif\">他人期待會反過來塑造個人行為<\u002Fem>。被當作主管的人會慢慢長出主管的樣子；被當作專家的人會逐漸具備專家的判斷。<\u002Fp>\n\n        <blockquote>\n          做什麼就要像什麼。<br>\n          像什麼，慢慢就會是什麼。\n        <\u002Fblockquote>\n\n        <h3>本課收束<\u002Fh3>\n        <ul class=\"dashed\">\n          <li>說服沒有標準答案，只有情境匹配。<\u002Fli>\n          <li>ELM 是現代說服理論最實用的框架。<\u002Fli>\n          <li>成功的說服通常是兩條路徑的組合。<\u002Fli>\n          <li>先用故事提升動機，再用理性提供證據。<\u002Fli>\n          <li>印象管理不是包裝，而是讓你「看起來像你說的那個人」。<\u002Fli>\n        <\u002Ful>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <div class=\"mt-a\">\n      <hr class=\"rule-thin\">\n      <div class=\"between\">\n        <small>第三課　說服　·　§3 印象管理<\u002Fsmall>\n        <small class=\"serif italic\">— 11 —<\u002Fsmall>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- ============================================== -->\n<!-- LESSON IV · 領導與影響力                          -->\n<!-- ============================================== -->\n<section class=\"page black\" data-screen-label=\"L4 領導 opener\">\n  <div class=\"runner top\" style=\"color:#aaa;\">\n    <span>劉定睿　M11409313<\u002Fspan>\n    <span><em>Lesson IV · Leadership<\u002Fem><\u002Fspan>\n  <\u002Fdiv>\n  <div class=\"content\">\n    <div class=\"opener\">\n      <div>\n        <div class=\"smallcaps\" style=\"color:#aaa;\">Lesson<\u002Fdiv>\n        <div class=\"huge\">IV.<\u002Fdiv>\n      <\u002Fdiv>\n      <div>\n        <h1 style=\"font-size: 44pt; line-height:1.0;\">領導與影響力<span class=\"serif italic\" style=\"font-weight:400;\">.<\u002Fspan><\u002Fh1>\n        <p class=\"serif italic\" style=\"font-size: 22pt; line-height:1.3; margin-top:8mm; max-width:140mm;\">\n          領導<br>就是影響力。\n        <\u002Fp>\n        <p style=\"margin-top: 14mm; max-width: 140mm; color:#ccc;\">\n          領導的本質不是權力，而是影響力。權力來自職位，影響力來自被信任。一個能下命令但不被信任的人，並不是領導者。\n        <\u002Fp>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"mt-a\">\n      <hr class=\"rule-thin\">\n      <div class=\"between\">\n        <small style=\"color:#aaa;\">二節 · §1 經理人與領導者　§2 媒體依賴與影響力放大<\u002Fsmall>\n        <small class=\"serif italic\" style=\"color:#fff;\">— 12 —<\u002Fsmall>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<section class=\"page\" data-screen-label=\"L4.1 領導\">\n  <div class=\"runner top\">\n    <span><em>Lesson IV · Leadership<\u002Fem><\u002Fspan>\n    <span>§ 1　經理人與領導者<\u002Fspan>\n  <\u002Fdiv>\n  <div class=\"content\">\n\n    <div class=\"smallcaps\">§ 1<\u002Fdiv>\n    <h2 style=\"margin-top: 3mm;\">領導：<span class=\"serif italic\">經理人與領導者的差別。<\u002Fspan><\u002Fh2>\n\n    <hr class=\"rule-double\">\n\n    <div class=\"grid cols-2\" style=\"gap: 7mm;\">\n      <div>\n        <h3>兩種不同的邏輯<\u002Fh3>\n        <table>\n          <thead><tr><th><\u002Fth><th>領導者<\u002Fth><th>經理人<\u002Fth><\u002Ftr><\u002Fthead>\n          <tbody>\n            <tr><td>權力來源<\u002Ftd><td>個人魅力、信任、認同<\u002Ftd><td>職位授權<\u002Ftd><\u002Ftr>\n            <tr><td>核心任務<\u002Ftd><td>創造方向（Vision）<\u002Ftd><td>執行任務（Execution）<\u002Ftd><\u002Ftr>\n            <tr><td>管理方式<\u002Ftd><td>影響與說服<\u002Ftd><td>制度與控制<\u002Ftd><\u002Ftr>\n            <tr><td>適用情境<\u002Ftd><td>變革、不確定環境<\u002Ftd><td>穩定、例行運作<\u002Ftd><\u002Ftr>\n          <\u002Ftbody>\n        <\u002Ftable>\n        <p style=\"margin-top: 3mm;\">經理人解決「<em class=\"serif\">如何做<\u002Fem>」；領導者回答「<em class=\"serif\">為何做<\u002Fem>」。<\u002Fp>\n\n        <blockquote>\n          沒有領導的管理，只會造成服從；<br>\n          沒有管理的領導，只會停留在理想。\n        <\u002Fblockquote>\n      <\u002Fdiv>\n\n      <div>\n        <h3>狼與哈士奇<\u002Fh3>\n        <p>課堂上提出一個高度抽象化的比喻：<\u002Fp>\n        <table>\n          <tbody>\n            <tr><td><strong>狼<\u002Fstrong><\u002Ftd><td>領導者。具前瞻視野，能在不確定中行動，不依賴既有資源。<\u002Ftd><\u002Ftr>\n            <tr><td><strong>哈士奇<\u002Fstrong><\u002Ftd><td>經理人。依循規則、穩定執行，依賴組織供給。<\u002Ftd><\u002Ftr>\n          <\u002Ftbody>\n        <\u002Ftable>\n        <p>組織在轉型期需要更多狼；在穩定期需要更多哈士奇。兩者沒有高下，只有時機。<\u002Fp>\n\n        <h3>領導理論的演進<\u002Fh3>\n        <ol>\n          <li><strong>特質理論<\u002Fstrong>—領導者是天生的，重視人格特質。問題是特質無一致標準，不具可操作性。<\u002Fli>\n          <li><strong>行為理論<\u002Fstrong>—將領導分為任務導向（強調 KPI）與關係導向（重視員工感受）。<\u002Fli>\n          <li><strong>情境理論<\u002Fstrong>—不存在最佳領導風格，只有<em class=\"serif\">最適合當下情境<\u002Fem>的風格。<\u002Fli>\n        <\u002Fol>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <div class=\"mt-a\">\n      <hr class=\"rule-thin\">\n      <div class=\"between\">\n        <small>第四課　領導　·　§1 經理人與領導者<\u002Fsmall>\n        <small class=\"serif italic\">— 13 —<\u002Fsmall>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<section class=\"page\" data-screen-label=\"L4.1b 領導案例\">\n  <div class=\"runner top\">\n    <span><em>Lesson IV · Leadership<\u002Fem><\u002Fspan>\n    <span>§ 1　續：權力來源與案例<\u002Fspan>\n  <\u002Fdiv>\n  <div class=\"content\">\n\n    <div class=\"smallcaps\">§ 1 · cont.<\u002Fdiv>\n    <h2 style=\"margin-top: 3mm;\">權力 <span class=\"serif italic\">≠<\u002Fspan> 領導。<\u002Fh2>\n\n    <hr class=\"rule-double\">\n\n    <div class=\"grid cols-2\" style=\"gap: 7mm;\">\n      <div>\n        <h3>兩種權力來源<\u002Fh3>\n        <h4>正式權力<\u002Fh4>\n        <p>來自職位—廠長、主管、總經理—依賴制度與命令。<\u002Fp>\n\n        <h4>非正式權力<\u002Fh4>\n        <p>來自信任、專業、影響力—典型的是組織中的「意見領袖」。<\u002Fp>\n\n        <p style=\"margin-top: 4mm;\">在變革情境中，真正影響組織的<strong>往往是非正式權力<\u002Fstrong>，而非高層命令。意見領袖一句話，可能比 CEO 一份公文有效。<\u002Fp>\n\n        <h3>領導的核心能力：說服<\u002Fh3>\n        <p>領導本質上是一種說服過程：改變員工對變革的認知、降低抗拒與不確定性。第三課的<em class=\"serif\">雙路徑<\u002Fem>同樣適用：<\u002Fp>\n        <ul class=\"dashed\">\n          <li>理性說服（中央路徑）—數據、邏輯、效率提升，適用於專業員工。<\u002Fli>\n          <li>感性說服（邊緣路徑）—願景、故事、情緒連結，適用於大眾。<\u002Fli>\n        <\u002Ful>\n      <\u002Fdiv>\n\n      <div>\n        <h3>案例　AI 轉型中的領導困境<\u002Fh3>\n        <p>組織導入 AI 時常見：員工抗拒、對失業恐懼、謠言擴散。本質不是技術問題，而是<strong>認知與信任問題<\u002Fstrong>。<\u002Fp>\n\n        <h4 style=\"margin-top:4mm;\">三種領導方式比較<\u002Fh4>\n        <table>\n          <thead><tr><th>方式<\u002Fth><th>做法<\u002Fth><th>問題<\u002Fth><\u002Ftr><\u002Fthead>\n          <tbody>\n            <tr><td>經理人模式<\u002Ftd><td>嚴格 21 天 SOP，強制執行<\u002Ftd><td>引發更大抗拒<\u002Ftd><\u002Ftr>\n            <tr><td>願景型領導<\u002Ftd><td>描繪未來、強調不會失業<\u002Ftd><td>缺證據時被視為空話<\u002Ftd><\u002Ftr>\n            <tr><td>影響力策略<\u002Ftd><td>建立種子員工、利用同儕擴散<\u002Ftd><td>需要時間與機制<\u002Ftd><\u002Ftr>\n          <\u002Ftbody>\n        <\u002Ftable>\n\n        <h3 style=\"margin-top:5mm;\">領導在變革中的三大任務<\u002Fh3>\n        <ol>\n          <li><strong>建立信任<\u002Fstrong>—誠實揭露風險（包含裁員可能），避免資訊不對稱。<\u002Fli>\n          <li><strong>管理認知<\u002Fstrong>—消除謠言，重塑「AI ＝ 威脅」的框架。<\u002Fli>\n          <li><strong>動員關鍵人<\u002Fstrong>—找出 early adopters，透過意見領袖擴散。<\u002Fli>\n        <\u002Fol>\n\n        <p style=\"margin-top: 4mm;\" class=\"serif italic\">領導不是解問題，而是處理矛盾。<br>領導的核心能力，是不確定性管理。<\u002Fp>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <div class=\"mt-a\">\n      <hr class=\"rule-thin\">\n      <div class=\"between\">\n        <small>第四課　領導　·　§1 續<\u002Fsmall>\n        <small class=\"serif italic\">— 14 —<\u002Fsmall>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<section class=\"page\" data-screen-label=\"L4.2 媒體依賴\">\n  <div class=\"runner top\">\n    <span><em>Lesson IV · Leadership<\u002Fem><\u002Fspan>\n    <span>§ 2　媒體依賴<\u002Fspan>\n  <\u002Fdiv>\n  <div class=\"content\">\n\n    <div class=\"smallcaps\">§ 2<\u002Fdiv>\n    <h2 style=\"margin-top: 3mm;\">媒體依賴：<span class=\"serif italic\">影響力如何被放大。<\u002Fspan><\u002Fh2>\n\n    <hr class=\"rule-double\">\n\n    <div class=\"grid cols-2\" style=\"gap: 7mm;\">\n      <div>\n        <h3>消費者使用媒體的三種目的<\u002Fh3>\n\n        <h4>一　理解依賴<\u002Fh4>\n        <p>用媒體獲取資訊—例如查產品比較、看新聞、找解釋。當人對某件事「想搞懂」時，他依賴媒體幫他理解。<\u002Fp>\n\n        <h4>二　指導依賴<\u002Fh4>\n        <p>用媒體學習決策方式—例如看評測、看教學、看別人怎麼選。媒體在此扮演的是「<em class=\"serif\">引導判斷<\u002Fem>」的角色。<\u002Fp>\n\n        <h4>三　娛樂依賴<\u002Fh4>\n        <p>用媒體放鬆與消遣。這類使用看似「不重要」，但其實是接觸量最大的場景—大量品牌的滲透，都發生在娛樂時段。<\u002Fp>\n\n        <p style=\"margin-top: 3mm;\">行銷與影響力的設計，必須<strong>同時滿足這三種需求<\u002Fstrong>—單純資訊型的內容無法被傳播；單純娛樂型的內容沒有說服力。<\u002Fp>\n      <\u002Fdiv>\n\n      <div>\n        <h3>自我效能　<span class=\"serif italic\">Self-efficacy<\u002Fspan><\u002Fh3>\n        <p>自我效能指個體對自己完成某任務的信心程度。它直接影響資訊行為：<\u002Fp>\n        <table>\n          <tbody>\n            <tr><td>高自我效能<\u002Ftd><td>傾向自主搜尋資訊、自己比較與判斷<\u002Ftd><\u002Ftr>\n            <tr><td>低自我效能<\u002Ftd><td>傾向依賴他人意見—名人、KOL、好友推薦<\u002Ftd><\u002Ftr>\n          <\u002Ftbody>\n        <\u002Ftable>\n\n        <h3>名人 vs 素人代言<\u002Fh3>\n        <table>\n          <tbody>\n            <tr><td>名人<\u002Ftd><td>提高曝光與信任，但長期可能流失（sleeping effect）。<\u002Ftd><\u002Ftr>\n            <tr><td>素人<\u002Ftd><td>提升真實性與貼近度，說服力強，但聲量低。<\u002Ftd><\u002Ftr>\n          <\u002Ftbody>\n        <\u002Ftable>\n        <p style=\"margin-top: 3mm;\">用哪一種，取決於受眾的自我效能與情境—專業產品強調技術資訊；大眾產品強調代言與口碑。<\u002Fp>\n\n        <blockquote>\n          影響力被放大的方式，<br>\n          不是音量更大，<br>\n          而是被需要的人剛好在聽。\n        <\u002Fblockquote>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <div class=\"mt-a\">\n      <hr class=\"rule-thin\">\n      <div class=\"between\">\n        <small>第四課　領導　·　§2 媒體依賴<\u002Fsmall>\n        <small class=\"serif italic\">— 15 —<\u002Fsmall>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- ============================================== -->\n<!-- LESSON V · 群體                                 -->\n<!-- ============================================== -->\n<section class=\"page black\" data-screen-label=\"L5 群體 opener\">\n  <div class=\"runner top\" style=\"color:#aaa;\">\n    <span>劉定睿　M11409313<\u002Fspan>\n    <span><em>Lesson V · Group<\u002Fem><\u002Fspan>\n  <\u002Fdiv>\n  <div class=\"content\">\n    <div class=\"opener\">\n      <div>\n        <div class=\"smallcaps\" style=\"color:#aaa;\">Lesson<\u002Fdiv>\n        <div class=\"huge\">V.<\u002Fdiv>\n      <\u002Fdiv>\n      <div>\n        <h1 style=\"font-size: 44pt; line-height:1.0;\">群體<span class=\"serif italic\" style=\"font-weight:400;\">.<\u002Fspan><\u002Fh1>\n        <p class=\"serif italic\" style=\"font-size: 22pt; line-height:1.3; margin-top:8mm; max-width:140mm;\">\n          人多，<br>\n          不一定理性。\n        <\u002Fp>\n        <p style=\"margin-top: 14mm; max-width: 140mm; color:#ccc;\">\n          一個人會犯錯，一群人也會。而且一群人犯錯時，常常看起來像是「達成了共識」。本課討論群體判斷的三個陷阱：粉絲不是社會資本、全票通過反而是風險、多數決不等於共識。\n        <\u002Fp>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"mt-a\">\n      <hr class=\"rule-thin\">\n      <div class=\"between\">\n        <small style=\"color:#aaa;\">三節 · §1 社會資本　§2 沉默螺旋　§3 群體迷思與極化<\u002Fsmall>\n        <small class=\"serif italic\" style=\"color:#fff;\">— 16 —<\u002Fsmall>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<section class=\"page\" data-screen-label=\"L5.1 社會資本\">\n  <div class=\"runner top\">\n    <span><em>Lesson V · Group<\u002Fem><\u002Fspan>\n    <span>§ 1　社會資本<\u002Fspan>\n  <\u002Fdiv>\n  <div class=\"content\">\n\n    <div class=\"smallcaps\">§ 1<\u002Fdiv>\n    <h2 style=\"margin-top: 3mm;\">社會資本：<span class=\"serif italic\">社群如何運作。<\u002Fspan><\u002Fh2>\n\n    <hr class=\"rule-double\">\n\n    <div class=\"grid cols-2\" style=\"gap: 7mm;\">\n      <div>\n        <h3>資本的演進<\u002Fh3>\n        <ol>\n          <li><strong>人力資本<\u002Fstrong>—依賴勞動投入，收益與時間成正比。<\u002Fli>\n          <li><strong>財務資本<\u002Fstrong>—透過資金運作獲利。<\u002Fli>\n          <li><strong>智慧資本<\u002Fstrong>—來自知識與技術。<\u002Fli>\n          <li><strong>社會資本<\u002Fstrong>—來自人際網絡與關係結構。<\u002Fli>\n        <\u002Fol>\n        <p>現代競爭的核心逐漸轉向社會資本—關鍵不再是你會什麼，而是你<em class=\"serif\">連結到誰<\u002Fem>。<\u002Fp>\n\n        <h3>強連結 vs 弱連結<\u002Fh3>\n        <table>\n          <thead><tr><th><\u002Fth><th>強連結<\u002Fth><th>弱連結<\u002Fth><\u002Ftr><\u002Fthead>\n          <tbody>\n            <tr><td>對象<\u002Ftd><td>同事、朋友、親密關係<\u002Ftd><td>陌生人、跨圈層<\u002Ftd><\u002Ftr>\n            <tr><td>優點<\u002Ftd><td>信任高<\u002Ftd><td>新資訊來源<\u002Ftd><\u002Ftr>\n            <tr><td>缺點<\u002Ftd><td>資訊重複<\u002Ftd><td>信任低<\u002Ftd><\u002Ftr>\n          <\u002Ftbody>\n        <\u002Ftable>\n        <p style=\"margin-top: 3mm;\" class=\"serif italic\">機會多來自弱連結，而非強連結。<\u002Fp>\n      <\u002Fdiv>\n\n      <div>\n        <h3>三種中心度<\u002Fh3>\n        <p>社會資本不只是數量，更是<strong>結構位置<\u002Fstrong>。網絡分析給出三種中心度：<\u002Fp>\n        <ul class=\"dashed\">\n          <li><strong>度中心度<\u002Fstrong>—有多少人認識你（粉絲數）。<\u002Fli>\n          <li><strong>中介中心度<\u002Fstrong>—你是不是關鍵的「連接者」。<\u002Fli>\n          <li><strong>特徵向量中心度<\u002Fstrong>—你連結到的人，重不重要。<\u002Fli>\n        <\u002Ful>\n\n        <h3>三度影響理論<\u002Fh3>\n        <p>個體行為會透過「<em class=\"serif\">朋友 → 朋友的朋友 → 再延伸一層<\u002Fem>」傳播。範圍包括消費行為、生活方式、價值觀。一個節點，可能影響數百甚至上千人。<\u002Fp>\n\n        <h3>百萬鐵粉計畫的誤解<\u002Fh3>\n        <p>某傳統零售業面對電商衝擊，提出「百萬鐵粉計畫」—讓所有店長都成為網紅。問題在於：<\u002Fp>\n        <ul class=\"dashed\">\n          <li>店長 ≠ 網紅，營運能力 ≠ 內容創作能力。<\u002Fli>\n          <li>粉絲數量被誤認為「社會資本」。<\u002Fli>\n        <\u002Ful>\n        <p class=\"serif italic\">無互動，無價值；無信任，無轉換；<br>無關係，無影響力。<\u002Fp>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <div class=\"mt-a\">\n      <hr class=\"rule-thin\">\n      <div class=\"between\">\n        <small>第五課　群體　·　§1 社會資本<\u002Fsmall>\n        <small class=\"serif italic\">— 17 —<\u002Fsmall>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<section class=\"page\" data-screen-label=\"L5.2 沉默螺旋\">\n  <div class=\"runner top\">\n    <span><em>Lesson V · Group<\u002Fem><\u002Fspan>\n    <span>§ 2　沉默螺旋<\u002Fspan>\n  <\u002Fdiv>\n  <div class=\"content\">\n\n    <div class=\"smallcaps\">§ 2<\u002Fdiv>\n    <h2 style=\"margin-top: 3mm;\">沉默螺旋：<span class=\"serif italic\">主流意見如何形成。<\u002Fspan><\u002Fh2>\n\n    <hr class=\"rule-double\">\n\n    <div class=\"grid cols-2\" style=\"gap: 7mm;\">\n      <div>\n        <h3>全票通過的風險<\u002Fh3>\n        <p>為什麼「全票通過」反而可能是企業最大的風險？答案是<strong>沉默螺旋<\u002Fstrong>。<\u002Fp>\n        <p>當個體察覺自身意見為少數時，傾向選擇沉默；沉默會強化「表面共識」；最終形成錯誤決策。<\u002Fp>\n        <p>在百萬鐵粉案例中，董事長與資深主管明確表態支持，中階與基層員工即使反對也不敢發聲—結果形成「假性共識」。<\u002Fp>\n\n        <blockquote>\n          全票通過 ≠ 真正同意，<br>\n          而是意見壓抑的結果。\n        <\u002Fblockquote>\n\n        <h3>組織中的「統計嗅覺」<\u002Fh3>\n        <p>人類在群體中具有快速判斷主流意見、調整自身表達策略的能力。這在小團體中是社交技巧；在組織決策中卻是危險—它讓多元觀點消失。<\u002Fp>\n      <\u002Fdiv>\n\n      <div>\n        <h3>對策（一）　策略性發言<\u002Fh3>\n        <ul class=\"dashed\">\n          <li>表面支持，實質修正—以「降低風險」角度切入。<\u002Fli>\n          <li>提出執行風險。<\u002Fli>\n          <li>建議先行試點（pilot test）。<\u002Fli>\n        <\u002Ful>\n\n        <h3>對策（二）　延後決策<\u002Fh3>\n        <p>要求進一步分析，爭取時間整合反對意見。<\u002Fp>\n\n        <h3>對策（三）　建立聯盟<\u002Fh3>\n        <p>在會議外整合中階管理層，形成「集體反對」而非個人意見—個人反對容易被孤立，集體反對才會被聽見。<\u002Fp>\n\n        <h3>對策（四）　魔鬼代言人機制<\u002Fh3>\n        <table>\n          <thead><tr><th>方法<\u002Fth><th>優點<\u002Fth><th>風險<\u002Fth><\u002Ftr><\u002Fthead>\n          <tbody>\n            <tr><td>匿名機制<\u002Ftd><td>降低壓力<\u002Ftd><td>可能引發猜忌<\u002Ftd><\u002Ftr>\n            <tr><td>輪流制度<\u002Ftd><td>公平性高<\u002Ftd><td>專業性不足<\u002Ftd><\u002Ftr>\n            <tr><td>外部顧問<\u002Ftd><td>客觀性強<\u002Ftd><td>成本高<\u002Ftd><\u002Ftr>\n          <\u002Ftbody>\n        <\u002Ftable>\n        <p style=\"margin-top: 2mm;\">三項原則：<em class=\"serif\">角色制度化、高層最後發言、心理安全<\u002Fem>。<\u002Fp>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <div class=\"mt-a\">\n      <hr class=\"rule-thin\">\n      <div class=\"between\">\n        <small>第五課　群體　·　§2 沉默螺旋<\u002Fsmall>\n        <small class=\"serif italic\">— 18 —<\u002Fsmall>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<section class=\"page\" data-screen-label=\"L5.3 群體迷思\">\n  <div class=\"runner top\">\n    <span><em>Lesson V · Group<\u002Fem><\u002Fspan>\n    <span>§ 3　群體迷思與極化<\u002Fspan>\n  <\u002Fdiv>\n  <div class=\"content\">\n\n    <div class=\"smallcaps\">§ 3<\u002Fdiv>\n    <h2 style=\"margin-top: 3mm;\">群體迷思與極化：<span class=\"serif italic\">為什麼大家還是要開會。<\u002Fspan><\u002Fh2>\n\n    <hr class=\"rule-double\">\n\n    <div class=\"grid cols-2\" style=\"gap: 7mm;\">\n      <div>\n        <h3>群體極化<\u002Fh3>\n        <p>當某一群人的聲音特別大時，會造成：<\u002Fp>\n        <ul class=\"dashed\">\n          <li>組織認知偏移<\u002Fli>\n          <li>情緒擴散<\u002Fli>\n          <li>立場越來越極端<\u002Fli>\n        <\u002Ful>\n        <p>例如少數消極員工若聲量很大，可能讓其他人誤以為「<em class=\"serif\">整個組織都在擺爛<\u002Fem>」。極化的可怕之處不在於聲音大，而在於它<strong>會反過來改變多數人的認知<\u002Fstrong>。<\u002Fp>\n\n        <h3>群體迷思<\u002Fh3>\n        <p>表面民主，不代表真正反映群體意見。<\u002Fp>\n        <p>畢業旅行投票的例子：日本 40 票、綠島 35 票、韓國 25 票。日本以最高票勝出，但其實<strong>有 60 人不想去日本<\u002Fstrong>。<\u002Fp>\n        <p class=\"serif italic\">人們通常只表達「最喜歡什麼」，卻很少表達「最討厭什麼」。<\u002Fp>\n      <\u002Fdiv>\n\n      <div>\n        <h3>所以還要開會嗎？<\u002Fh3>\n        <p>會議常被批評為效率低落，但它的真正功能不是「決策」，而是—<\u002Fp>\n        <ul class=\"dashed\">\n          <li>讓沉默被看見<\u002Fli>\n          <li>讓少數意見能進入紀錄<\u002Fli>\n          <li>讓非正式權力（意見領袖）能發揮槓桿<\u002Fli>\n          <li>讓決策不只在「同意層」，也在「不同意層」被檢驗<\u002Fli>\n        <\u002Ful>\n        <p>沒有會議的組織，往往不是更有效率，而是更早形成假性共識。<\u002Fp>\n\n        <h3>本課收束<\u002Fh3>\n        <ul class=\"dashed\">\n          <li>社會資本重質不重量。<\u002Fli>\n          <li>全票通過是高風險訊號。<\u002Fli>\n          <li>多數決並不等於共識。<\u002Fli>\n          <li>群體決策需要制度化的「反對」。<\u002Fli>\n          <li>真正的競爭優勢來自關係結構，而非流量數據。<\u002Fli>\n        <\u002Ful>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <div class=\"mt-a\">\n      <hr class=\"rule-thin\">\n      <div class=\"between\">\n        <small>第五課　群體　·　§3 群體迷思與極化<\u002Fsmall>\n        <small class=\"serif italic\">— 19 —<\u002Fsmall>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- ============================================== -->\n<!-- LESSON VI · 團隊                                -->\n<!-- ============================================== -->\n<section class=\"page black\" data-screen-label=\"L6 團隊 opener\">\n  <div class=\"runner top\" style=\"color:#aaa;\">\n    <span>劉定睿　M11409313<\u002Fspan>\n    <span><em>Lesson VI · Team<\u002Fem><\u002Fspan>\n  <\u002Fdiv>\n  <div class=\"content\">\n    <div class=\"opener\">\n      <div>\n        <div class=\"smallcaps\" style=\"color:#aaa;\">Lesson<\u002Fdiv>\n        <div class=\"huge\">VI.<\u002Fdiv>\n      <\u002Fdiv>\n      <div>\n        <h1 style=\"font-size: 44pt; line-height:1.0;\">團隊<span class=\"serif italic\" style=\"font-weight:400;\">.<\u002Fspan><\u002Fh1>\n        <p class=\"serif italic\" style=\"font-size: 22pt; line-height:1.3; margin-top:8mm; max-width:140mm;\">\n          團隊靠互動，<br>\n          不靠人數。\n        <\u002Fp>\n        <p style=\"margin-top: 14mm; max-width: 140mm; color:#ccc;\">\n          一群人不會自動變成一支團隊。團隊必須經歷形成、激盪、規範、執行、解散—跳過任何一步，後面都會付代價。\n        <\u002Fp>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"mt-a\">\n      <hr class=\"rule-thin\">\n      <div class=\"between\">\n        <small style=\"color:#aaa;\">三節 · §1 公平　§2 群體動力　§3 社會抉擇<\u002Fsmall>\n        <small class=\"serif italic\" style=\"color:#fff;\">— 20 —<\u002Fsmall>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<section class=\"page\" data-screen-label=\"L6.1 公平\">\n  <div class=\"runner top\">\n    <span><em>Lesson VI · Team<\u002Fem><\u002Fspan>\n    <span>§ 1　公平<\u002Fspan>\n  <\u002Fdiv>\n  <div class=\"content\">\n\n    <div class=\"smallcaps\">§ 1<\u002Fdiv>\n    <h2 style=\"margin-top: 3mm;\">公平：<span class=\"serif italic\">理性與感性，哪個比較重要。<\u002Fspan><\u002Fh2>\n\n    <hr class=\"rule-double\">\n\n    <div class=\"grid cols-2\" style=\"gap: 7mm;\">\n      <div>\n        <h3>公平不是數學問題<\u002Fh3>\n        <p>傳統經濟學假設人是理性的—但在公平議題上，人們會同時考慮自身所得，與<strong>他人的所得<\u002Fstrong>。<\u002Fp>\n        <p>經典的遺產分配情境：接受不公平分配可以得到部分利益、拒絕則雙方皆無所得。理性選擇應為接受，但<em class=\"serif\">多數人會拒絕<\u002Fem>—因為他們願意為了懲罰不公平，犧牲自己的利益。<\u002Fp>\n\n        <blockquote>\n          不患寡，<br>\n          而患不均。\n        <\u002Fblockquote>\n\n        <h3>兩種公平<\u002Fh3>\n        <table>\n          <thead><tr><th>類型<\u002Fth><th>定義<\u002Fth><\u002Ftr><\u002Fthead>\n          <tbody>\n            <tr><td>理性公平 <span class=\"serif italic\">Distributive<\u002Fspan><\u002Ftd><td>基於數學與分配比例（如平均分配）<\u002Ftd><\u002Ftr>\n            <tr><td>感知公平 <span class=\"serif italic\">Perceived<\u002Fspan><\u002Ftd><td>基於價值認知、貢獻感、道德評價<\u002Ftd><\u002Ftr>\n          <\u002Ftbody>\n        <\u002Ftable>\n        <p style=\"margin-top: 3mm;\" class=\"serif italic\">管理中不存在「客觀公平」，<br>只有「被認知的公平」。<\u002Fp>\n      <\u002Fdiv>\n\n      <div>\n        <h3>不公平的行為反應<\u002Fh3>\n        <p>當個體感知不公平時，可能出現：<\u002Fp>\n        <ul class=\"dashed\">\n          <li>降低投入（reduced effort）<\u002Fli>\n          <li>要求補償（compensation demand）<\u002Fli>\n          <li>認知重建（cognitive reframing）<\u002Fli>\n          <li>報復或對抗（retaliation）<\u002Fli>\n          <li>退出組織（exit）<\u002Fli>\n        <\u002Ful>\n        <p>這些反應不會立刻出現，但長期累積會直接侵蝕組織績效與穩定性。<\u002Fp>\n\n        <h3>所以該怎麼做？<\u002Fh3>\n        <p>領導者要管理的不是「絕對公平」，而是「<em class=\"serif\">感知公平<\u002Fem>」。具體手段（將在 §3 進一步討論）包含：<\u002Fp>\n        <ul class=\"dashed\">\n          <li>隱藏總額（資訊不對稱）<\u002Fli>\n          <li>非金錢補償（升遷、肯定）<\u002Fli>\n          <li>分階段分配（lifecycle allocation）<\u002Fli>\n          <li>建立事前規則（ex ante contract）<\u002Fli>\n          <li>第三方評估（external validation）<\u002Fli>\n        <\u002Ful>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <div class=\"mt-a\">\n      <hr class=\"rule-thin\">\n      <div class=\"between\">\n        <small>第六課　團隊　·　§1 公平<\u002Fsmall>\n        <small class=\"serif italic\">— 21 —<\u002Fsmall>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<section class=\"page\" data-screen-label=\"L6.2 群體動力\">\n  <div class=\"runner top\">\n    <span><em>Lesson VI · Team<\u002Fem><\u002Fspan>\n    <span>§ 2　群體動力<\u002Fspan>\n  <\u002Fdiv>\n  <div class=\"content\">\n\n    <div class=\"smallcaps\">§ 2<\u002Fdiv>\n    <h2 style=\"margin-top: 3mm;\">群體動力：<span class=\"serif italic\">團隊發展的五個階段。<\u002Fspan><\u002Fh2>\n\n    <hr class=\"rule-double\">\n\n    <div class=\"grid cols-2\" style=\"gap: 7mm;\">\n      <div>\n        <h3>Tuckman 的五階段<\u002Fh3>\n        <ol>\n          <li><strong>形成<\u002Fstrong>　Forming —客氣、試探、不確定。<\u002Fli>\n          <li><strong>激盪<\u002Fstrong>　Storming —價值觀衝突、爭執、權力角力。<\u002Fli>\n          <li><strong>規範<\u002Fstrong>　Norming —建立規則、形成默契。<\u002Fli>\n          <li><strong>執行<\u002Fstrong>　Performing —高效協作、產生成果。<\u002Fli>\n          <li><strong>解散<\u002Fstrong>　Adjourning —任務結束、團隊解散。<\u002Fli>\n        <\u002Fol>\n\n        <h3>常見錯誤：跳過激盪與規範<\u002Fh3>\n        <p>許多團隊—尤其是急著出成果的新團隊—會直接從「形成」跳到「執行」。表面看起來高效，實際上是「<em class=\"serif\">虛假穩定<\u002Fem>（pseudo-cohesion）」。<\u002Fp>\n        <p>因為衝突沒被處理、規則沒被建立，所有的歧見都被延後。等到資源分配或成果歸屬出現時—衝突會以最具破壞性的方式集中爆發。<\u002Fp>\n      <\u002Fdiv>\n\n      <div>\n        <h3>投射效應<\u002Fh3>\n        <p>由於缺乏溝通，每個成員會自我合理化—認為他人應該認同自己的價值：<\u002Fp>\n        <ul class=\"dashed\">\n          <li>工程師認為「技術貢獻最大」<\u002Fli>\n          <li>行銷認為「市場影響最大」<\u002Fli>\n          <li>PM 認為「協調整合最關鍵」<\u002Fli>\n        <\u002Ful>\n        <p>結果：<strong>每個人都認為自己理應獲得最多<\u002Fstrong>。<\u002Fp>\n\n        <h3>管理意涵<\u002Fh3>\n        <p>有效團隊必須：<\u002Fp>\n        <ul class=\"dashed\">\n          <li>主動引導衝突（controlled conflict）<\u002Fli>\n          <li>建立明確規則（explicit norms）<\u002Fli>\n          <li>形成共享認知（shared mental model）<\u002Fli>\n        <\u002Ful>\n\n        <blockquote>\n          團隊不是自然形成的，<br>\n          它是被「設計」出來的。\n        <\u002Fblockquote>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <div class=\"mt-a\">\n      <hr class=\"rule-thin\">\n      <div class=\"between\">\n        <small>第六課　團隊　·　§2 群體動力<\u002Fsmall>\n        <small class=\"serif italic\">— 22 —<\u002Fsmall>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<section class=\"page\" data-screen-label=\"L6.3 社會抉擇\">\n  <div class=\"runner top\">\n    <span><em>Lesson VI · Team<\u002Fem><\u002Fspan>\n    <span>§ 3　社會抉擇<\u002Fspan>\n  <\u002Fdiv>\n  <div class=\"content\">\n\n    <div class=\"smallcaps\">§ 3<\u002Fdiv>\n    <h2 style=\"margin-top: 3mm;\">社會抉擇：<span class=\"serif italic\">群體合作的困難。<\u002Fspan><\u002Fh2>\n\n    <hr class=\"rule-double\">\n\n    <div class=\"grid cols-2\" style=\"gap: 7mm;\">\n      <div>\n        <h3>Arrow 不可能定理<\u002Fh3>\n        <p>Kenneth Arrow 證明過一件令人難堪的事：<\u002Fp>\n        <p class=\"serif italic\">當有多個決策者、多個選項、不同偏好排序時，不存在一個能同時滿足所有人的最佳決策。<\u002Fp>\n\n        <h3>投票機制的錯誤假設<\u002Fh3>\n        <p>常見的誤解：<\u002Fp>\n        <ul class=\"dashed\">\n          <li>投票＝公平<\u002Fli>\n          <li>多數決＝最佳解<\u002Fli>\n        <\u002Ful>\n        <p>實際上，投票可能產生「<em class=\"serif\">投票悖論<\u002Fem>（Condorcet paradox）」—出現循環偏好（A&gt;B&gt;C&gt;A）。投票機制本身，無法保證穩定一致的最優解。<\u002Fp>\n\n        <h3>三人困境<\u002Fh3>\n        <p>當組織中存在三方利益時，<strong>無法達成全體最優<\u002Fstrong>，必須有人讓步。典型案例：<\u002Fp>\n        <ul class=\"dashed\">\n          <li>婆媳問題<\u002Fli>\n          <li>跨部門衝突<\u002Fli>\n          <li>專案資源分配<\u002Fli>\n        <\u002Ful>\n      <\u002Fdiv>\n\n      <div>\n        <h3>案例　Alpha 專案的「分贓困境」<\u002Fh3>\n        <p>三人團隊成功完成專案、獲得 50 萬獎金，分配時產生衝突：<\u002Fp>\n        <table>\n          <tbody>\n            <tr><td>工程師<\u002Ftd><td>主張 50%（技術導向）<\u002Ftd><\u002Ftr>\n            <tr><td>行銷<\u002Ftd><td>主張 50%（市場導向）<\u002Ftd><\u002Ftr>\n            <tr><td>PM<\u002Ftd><td>主張平均分配（協調導向）<\u002Ftd><\u002Ftr>\n          <\u002Ftbody>\n        <\u002Ftable>\n        <p style=\"margin-top: 3mm;\">問題核心：每人高估自身貢獻、價值體系衝突（工業時代重時間 vs 資訊時代重影響力）、誤用「平均＝公平」。結果：團隊冷戰、溝通崩潰、專案停滯。<\u002Fp>\n\n        <blockquote>分配問題比創造價值<br>更容易摧毀團隊。<\u002Fblockquote>\n\n        <h3>領導者的真實任務<\u002Fh3>\n        <p>不是找到「最公平解」，也不是追求「全體共識」—因為兩者都不存在。領導者真正要做的是：<\u002Fp>\n        <ul class=\"dashed\">\n          <li>承擔決策責任。<\u002Fli>\n          <li>做出「不完美但可執行」的選擇。<\u002Fli>\n          <li>管理感知公平，而非絕對公平。<\u002Fli>\n        <\u002Ful>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <div class=\"mt-a\">\n      <hr class=\"rule-thin\">\n      <div class=\"between\">\n        <small>第六課　團隊　·　§3 社會抉擇<\u002Fsmall>\n        <small class=\"serif italic\">— 23 —<\u002Fsmall>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- ============================================== -->\n<!-- LESSON VII · 組織                               -->\n<!-- ============================================== -->\n<section class=\"page black\" data-screen-label=\"L7 組織 opener\">\n  <div class=\"runner top\" style=\"color:#aaa;\">\n    <span>劉定睿　M11409313<\u002Fspan>\n    <span><em>Lesson VII · Organization<\u002Fem><\u002Fspan>\n  <\u002Fdiv>\n  <div class=\"content\">\n    <div class=\"opener\">\n      <div>\n        <div class=\"smallcaps\" style=\"color:#aaa;\">Lesson<\u002Fdiv>\n        <div class=\"huge\">VII.<\u002Fdiv>\n      <\u002Fdiv>\n      <div>\n        <h1 style=\"font-size: 44pt; line-height:1.0;\">組織<span class=\"serif italic\" style=\"font-weight:400;\">.<\u002Fspan><\u002Fh1>\n        <p class=\"serif italic\" style=\"font-size: 22pt; line-height:1.3; margin-top:8mm; max-width:140mm;\">\n          制度，<br>\n          決定行為。\n        <\u002Fp>\n        <p style=\"margin-top: 14mm; max-width: 140mm; color:#ccc;\">\n          當人多到無法靠認識彼此來協作時，就需要組織—需要制度、流程、分工。本課討論 AI 時代下組織運作邏輯的重構，以及群體中的社會惰化問題。\n        <\u002Fp>\n        <p style=\"color:#888; margin-top: 8mm; max-width: 140mm; font-size: 9pt;\">\n          ※ 大綱中之「代理」、「彼得原理」、「Web 2.0 組織」、「遊戲」於提供之筆記中無對應材料，依約定省略。\n        <\u002Fp>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"mt-a\">\n      <hr class=\"rule-thin\">\n      <div class=\"between\">\n        <small style=\"color:#aaa;\">二節 · §1 AI 時代的組織　§2 社會惰化與人機協作<\u002Fsmall>\n        <small class=\"serif italic\" style=\"color:#fff;\">— 24 —<\u002Fsmall>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<section class=\"page\" data-screen-label=\"L7.1 AI 時代的組織\">\n  <div class=\"runner top\">\n    <span><em>Lesson VII · Organization<\u002Fem><\u002Fspan>\n    <span>§ 1　AI 時代的組織<\u002Fspan>\n  <\u002Fdiv>\n  <div class=\"content\">\n\n    <div class=\"smallcaps\">§ 1<\u002Fdiv>\n    <h2 style=\"margin-top: 3mm;\">制度，<span class=\"serif italic\">決定行為。<\u002Fspan><\u002Fh2>\n\n    <hr class=\"rule-double\">\n\n    <div class=\"grid cols-2\" style=\"gap: 7mm;\">\n      <div>\n        <h3>知識工作正在被重構<\u002Fh3>\n        <p>過去需要大量專業時間的工作—統計分析、資料視覺化、問卷分析、報表繪製、文件翻譯—現在可以透過生成式 AI 快速完成。<\u002Fp>\n        <p>AI 正在取代「<em class=\"serif\">程序性知識工作<\u002Fem>」。未來真正重要的能力，不再是操作工具，而是：<\u002Fp>\n        <ul class=\"dashed\">\n          <li>知道要蒐集什麼資訊<\u002Fli>\n          <li>知道如何提出問題（prompting）<\u002Fli>\n          <li>知道如何設計分析邏輯<\u002Fli>\n          <li>知道如何判讀結果<\u002Fli>\n          <li>知道如何把 AI 整合進工作流程<\u002Fli>\n        <\u002Ful>\n\n        <h3>個人生產力 ≠ 組織生產力<\u002Fh3>\n        <p>AI 可以大幅提升個人生產力，但企業整體生產力<strong>未必同步提升<\u002Fstrong>。原因是多數使用仍停留在個人層次—個人翻譯、個人寫報告、個人整理資料。<\u002Fp>\n        <p>真正的瓶頸不是工具，而是<em class=\"serif\">部門之間的流程沒有被重新設計<\u002Fem>。<\u002Fp>\n      <\u002Fdiv>\n\n      <div>\n        <h3>新角色：AI 工作流整合者<\u002Fh3>\n        <p>未來企業需要的關鍵角色，不一定是工程師，而是能：<\u002Fp>\n        <ul class=\"dashed\">\n          <li>理解組織流程<\u002Fli>\n          <li>找出斷點<\u002Fli>\n          <li>將 AI 嵌入工作流程<\u002Fli>\n          <li>重新設計協作模式<\u002Fli>\n        <\u002Ful>\n\n        <h3>精兵策略<\u002Fh3>\n        <p>許多企業開始推動「精兵策略」—利用 AI 提高單位人力產值、強化高能力員工、減少低效率或抗拒 AI 的人力。管理者眼中的觀察軸線：<\u002Fp>\n        <ul class=\"dashed\">\n          <li>誰願意學 AI<\u002Fli>\n          <li>誰主動使用 AI<\u002Fli>\n          <li>誰抗拒技術改變<\u002Fli>\n        <\u002Ful>\n\n        <blockquote>\n          未來職場的競爭不只是<br>專業能力的競爭，<br>\n          而是「能否與 AI 協作」<br>的競爭。\n        <\u002Fblockquote>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <div class=\"mt-a\">\n      <hr class=\"rule-thin\">\n      <div class=\"between\">\n        <small>第七課　組織　·　§1 AI 時代的組織<\u002Fsmall>\n        <small class=\"serif italic\">— 25 —<\u002Fsmall>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<section class=\"page\" data-screen-label=\"L7.2 社會惰化與人機協作\">\n  <div class=\"runner top\">\n    <span><em>Lesson VII · Organization<\u002Fem><\u002Fspan>\n    <span>§ 2　社會惰化與人機協作<\u002Fspan>\n  <\u002Fdiv>\n  <div class=\"content\">\n\n    <div class=\"smallcaps\">§ 2<\u002Fdiv>\n    <h2 style=\"margin-top: 3mm;\">社會惰化：<span class=\"serif italic\">為什麼別人擺爛，我也想擺爛。<\u002Fspan><\u002Fh2>\n\n    <hr class=\"rule-double\">\n\n    <div class=\"grid cols-2\" style=\"gap: 7mm;\">\n      <div>\n        <h3>定義<\u002Fh3>\n        <p>當團隊中部分成員貢獻低、態度消極，卻仍享有相同成果時，其他成員會產生不公平感、降低投入、變得消極—最終形成：<\u002Fp>\n        <blockquote>既然別人擺爛，<br>我何必認真？<\u002Fblockquote>\n\n        <h3>案例<\u002Fh3>\n        <p>一位非常認真的 PM 把專案管理得很好；另一位 PM 管理不佳，常需要工程師救火。結果認真的 PM 反而資源不足、工作量更重、還被要求「分享成功經驗」。他會合理地問：<\u002Fp>\n        <p class=\"serif italic\">為什麼別人做不好，<br>卻要我來補救？<\u002Fp>\n        <p>這是社會惰化的起點—當「<em class=\"serif\">努力沒有被正確對應<\u002Fem>」變成可預測時，努力本身就會被退讓。<\u002Fp>\n      <\u002Fdiv>\n\n      <div>\n        <h3>降低社會惰化的方法<\u002Fh3>\n        <ol>\n          <li><strong>小團隊化<\u002Fstrong>—拆成小型敏捷團隊，提高責任可見度。<\u002Fli>\n          <li><strong>具體績效指標<\u002Fstrong>—建立可量化的成果。<\u002Fli>\n          <li><strong>同儕互評<\u002Fstrong>—降低搭便車行為。<\u002Fli>\n          <li><strong>短週期回饋<\u002Fstrong>—定期檢討與展示成果。<\u002Fli>\n        <\u002Fol>\n\n        <h3>人機協作：AI 不是取代<\u002Fh3>\n        <p>本課最終的洞察是：<\u002Fp>\n        <p class=\"serif italic\">AI 最好的角色不是「完全取代人」，<br>而是「協助人類提高判斷與效率」。<\u002Fp>\n        <ul class=\"dashed\">\n          <li><strong>物流業<\u002Fstrong>—用行車紀錄器蒐集資深司機的經驗（哪條路最快、哪裡容易違停、哪些時段塞車），再讓 AI 分析最佳路徑。經驗知識被數位化。<\u002Fli>\n          <li><strong>客服中心<\u002Fstrong>—保留真人客服，同時導入 AI 客服輔助系統。AI 同步分析問題、即時提供建議，真人客服決定如何回覆。不失「人的溫度」，又提高新手客服品質。<\u002Fli>\n        <\u002Ful>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <div class=\"mt-a\">\n      <hr class=\"rule-thin\">\n      <div class=\"between\">\n        <small>第七課　組織　·　§2 社會惰化與人機協作<\u002Fsmall>\n        <small class=\"serif italic\">— 26 —<\u002Fsmall>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- ============================================== -->\n<!-- CLOSING · 總論                                   -->\n<!-- ============================================== -->\n<section class=\"page black\" data-screen-label=\"總論 opener\">\n  <div class=\"runner top\" style=\"color:#aaa;\">\n    <span>劉定睿　M11409313<\u002Fspan>\n    <span><em>Coda · From Individual to Organization<\u002Fem><\u002Fspan>\n  <\u002Fdiv>\n  <div class=\"content\">\n    <div class=\"opener\">\n      <div>\n        <div class=\"smallcaps\" style=\"color:#aaa;\">Coda<\u002Fdiv>\n        <div class=\"huge\">★<\u002Fdiv>\n      <\u002Fdiv>\n      <div>\n        <h1 style=\"font-size: 38pt; line-height:1.05;\">總論<span class=\"serif italic\" style=\"font-weight:400;\">.<\u002Fspan><\u002Fh1>\n        <p class=\"serif italic\" style=\"font-size: 22pt; line-height:1.3; margin-top:8mm; max-width:140mm;\">\n          從一個人，<br>\n          到一個組織。\n        <\u002Fp>\n        <p style=\"margin-top: 14mm; max-width: 140mm; color:#ccc;\">\n          這本書談的不是七個獨立主題，而是同一件事的七個尺度。從一個人怎麼<em class=\"serif\">看見<\u002Fem>世界，到一群人怎麼<em class=\"serif\">一起<\u002Fem>看見世界—放大鏡換了好幾倍，但看的都是同一件事：人。\n        <\u002Fp>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"mt-a\">\n      <hr class=\"rule-thin\">\n      <div class=\"between\">\n        <small style=\"color:#aaa;\">三個值得帶走的觀念<\u002Fsmall>\n        <small class=\"serif italic\" style=\"color:#fff;\">— 27 —<\u002Fsmall>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<section class=\"page\" data-screen-label=\"總論 內文\">\n  <div class=\"runner top\">\n    <span><em>Coda<\u002Fem><\u002Fspan>\n    <span>從一個人到組織的演變<\u002Fspan>\n  <\u002Fdiv>\n  <div class=\"content\">\n\n    <div class=\"smallcaps\">Coda<\u002Fdiv>\n    <h2 style=\"margin-top: 3mm;\">三個值得帶走的觀念。<\u002Fh2>\n\n    <hr class=\"rule-double\">\n\n    <div class=\"grid cols-2\" style=\"gap: 8mm;\">\n      <div>\n        <h3>一　AI 正在重構知識工作<\u002Fh3>\n        <p>重點不再只是「會做」，而是—<\u002Fp>\n        <ul class=\"dashed\">\n          <li>會提問<\u002Fli>\n          <li>會整合<\u002Fli>\n          <li>會設計流程<\u002Fli>\n        <\u002Ful>\n        <p>知識的價值，從「<em class=\"serif\">擁有什麼<\u002Fem>」轉向「<em class=\"serif\">能讓什麼一起運作<\u002Fem>」。<\u002Fp>\n\n        <h3 style=\"margin-top: 7mm;\">二　組織問題的本質仍是「人」<\u002Fh3>\n        <p>不論 AI 多強，下列問題不會被技術解決：<\u002Fp>\n        <ul class=\"dashed\">\n          <li>公平感<\u002Fli>\n          <li>群體壓力<\u002Fli>\n          <li>社會惰化<\u002Fli>\n          <li>信任與合作<\u002Fli>\n        <\u002Ful>\n        <p>因此管理學在 AI 時代不會消失，反而會被更需要—因為技術愈強，「人的問題」反而愈裸露。<\u002Fp>\n\n        <h3 style=\"margin-top: 7mm;\">三　未來核心能力是「人機協作」<\u002Fh3>\n        <p>真正有價值的人才，不是完全被 AI 取代的人，而是—<\u002Fp>\n        <p class=\"serif italic\" style=\"font-size: 14pt;\">能利用 AI 放大自身能力的人。<\u002Fp>\n      <\u002Fdiv>\n\n      <div>\n        <h3>七課的脈絡，再看一次<\u002Fh3>\n        <table>\n          <thead><tr><th>課<\u002Fth><th>尺度<\u002Fth><th>關鍵字<\u002Fth><\u002Ftr><\u002Fthead>\n          <tbody>\n            <tr><td>I<\u002Ftd><td>一個人怎麼看<\u002Ftd><td>認知、注意力、故事<\u002Ftd><\u002Ftr>\n            <tr><td>II<\u002Ftd><td>一個人怎麼選<\u002Ftd><td>期望值、滿意解<\u002Ftd><\u002Ftr>\n            <tr><td>III<\u002Ftd><td>一個人說服另一個<\u002Ftd><td>ELM、印象管理<\u002Ftd><\u002Ftr>\n            <tr><td>IV<\u002Ftd><td>一個人帶少數人<\u002Ftd><td>領導、影響力、媒體依賴<\u002Ftd><\u002Ftr>\n            <tr><td>V<\u002Ftd><td>少數人變多數人<\u002Ftd><td>社會資本、沉默螺旋<\u002Ftd><\u002Ftr>\n            <tr><td>VI<\u002Ftd><td>多數人成為團隊<\u002Ftd><td>公平、群體動力、社會抉擇<\u002Ftd><\u002Ftr>\n            <tr><td>VII<\u002Ftd><td>團隊成為組織<\u002Ftd><td>AI、社會惰化、人機協作<\u002Ftd><\u002Ftr>\n          <\u002Ftbody>\n        <\u002Ftable>\n\n        <h3 style=\"margin-top: 6mm;\">最後一句話<\u002Fh3>\n        <blockquote>\n          AI 不只是工具革命，<br>\n          而是組織運作邏輯的革命。<br>\n          未來企業競爭的關鍵，<br>\n          將不是「有沒有 AI」，<br>\n          而是「能否重新設計工作流程與人機協作模式」。\n        <\u002Fblockquote>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <div class=\"mt-a\">\n      <hr class=\"rule-thin\">\n      <div class=\"between\">\n        <small>總論　Coda　·　從一個人到組織的演變<\u002Fsmall>\n        <small class=\"serif italic\">— 28 —<\u002Fsmall>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- ============================================== -->\n<!-- COLOPHON                                        -->\n<!-- ============================================== -->\n<section class=\"page\" data-screen-label=\"版權頁\">\n  <div class=\"runner top\">\n    <span>管理理論與實務<\u002Fspan>\n    <span>版權頁 <em>· Colophon<\u002Fem><\u002Fspan>\n  <\u002Fdiv>\n  <div class=\"content\">\n\n    <div style=\"margin-top: 60mm;\">\n      <div class=\"smallcaps\">Colophon<\u002Fdiv>\n      <h2 style=\"margin-top: 4mm;\">版權頁。<\u002Fh2>\n    <\u002Fdiv>\n\n    <hr class=\"rule-double\">\n\n    <div class=\"grid cols-2\" style=\"gap: 7mm;\">\n      <div>\n        <h3>關於這本書<\u002Fh3>\n        <p><strong>書名<\u002Fstrong>　管理理論與實務<\u002Fp>\n        <p><strong>副標<\u002Fstrong>　從一個人，到一個組織<\u002Fp>\n        <p><strong>編者<\u002Fstrong>　劉定睿　M11409313<\u002Fp>\n        <p><strong>內容來源<\u002Fstrong>　2026 春學期管理理論與實務課堂筆記（3 月 4 日至 5 月 13 日，共 9 次）<\u002Fp>\n        <p><strong>
