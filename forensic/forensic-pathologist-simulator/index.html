/* ─── 難度對應可用死因 ─── */
const DIFFICULTY_CAUSES = {
  1: ["acuteMI", "hanging", "fallFromHeight", "electrocution"],

  4: ["aorticDissection", "manualStrangulation", "sexualHomicide", "methCardiac", "drugInteraction", "childAbuse"]
};

/* ─── 空白毒物表（含參考範圍意義）─── */
function blankTox() {
  return {
    blood: {
      ethanol: ND,
      morphine: ND,
      codeine: ND,
      fentanyl: ND,
      methamphetamine: ND,
      amphetamine: ND,
      cocaine: ND,
      benzoylecgonine: ND,
      thc: ND,
      benzodiazepines: ND,
      acetaminophen: ND,
      carbonMonoxide: "<3"
    },
    urine: {
      morphine: ND,
      methamphetamine: ND,
      amphetamine: ND,
      cocaine: ND,
      thc: ND,
      benzodiazepines: ND
    },
    vitreousHumor: {
      ethanol: ND,
      glucose: `${rand(40, 90)}`,
      potassium: `${(rand(50, 150) / 10).toFixed(1)}`,
      sodium: `${rand(135, 145)}`,
      chloride: `${rand(98, 106)}`,
      urea: `${rand(10, 40)}`
    },
    gastricContents: "約 " + rand(50, 250) + " mL 部分消化食糜",
    liverTissue: {
      morphine: ND,
      fentanyl: ND,
      methamphetamine: ND
    }
  };
}

/* ─── 主生成函式 ─── */

  const height = isChild ? rand(75, 115) : sex === "Male" ? rand(165, 185) : rand(152, 170);
  const weight = isChild ? rand(9, 20) : sex === "Male" ? rand(60, 95) : rand(48, 75);

  /* ───────────────────────────────────────────────
     PMI 與環境（L3/L4 顯著拉長，腐敗干擾更強）
     ─────────────────────────────────────────────── */
  let pmiHours;
  if (difficulty === 1) pmiHours = rand(2, 18);else if (difficulty === 2) pmiHours = rand(4, 36);else if (difficulty === 3) pmiHours = rand(24, 168); // 1–7 天
  else pmiHours = rand(48, 336); // 2–14 天

  const decompIndex = pmiHours * Math.max(0.4, envTemp / 21);

  if (decompIndex < 24) decompStage = 0;else if (decompIndex < 72) decompStage = 1;else if (decompIndex < 168) decompStage = 2;else if (decompIndex < 480) decompStage = 3;else decompStage = 4;
  const decomposed = decompStage >= 1;

  } else if (pmiHours < 6) {

    livor = c.external?.livor || "背側屍斑形成中，輕壓可褪色";
  } else if (pmiHours < 24) {

    livor = c.external?.livor || "屍斑固定於背側（依姿勢），壓不褪色";
  } else if (pmiHours < 48) {
    rigor = "屍僵開始緩解";
    livor = c.external?.livor || "屍斑完全固定";

  /* ───────────────────────────────────────────────
     缺失證據系統（L3/L4）
     ─────────────────────────────────────────────── */
  const missing = new Set();
  const REDACT = "【證據受腐敗／檢材限制無法判讀】";

  return {

/* ─── 規則式評分（無 LLM）─── */
function scoreVerdictRules(caseData, verdict, examined) {
  const gt = caseData.groundTruth;

  const norm = s => (s || "").toLowerCase().replace(/\s+/g, "");

  // 關鍵字比對：取死因模板名稱的英文與中文關鍵詞

    aorticDissection: ["aortic", "dissection", "主動脈", "剝離"],
    manualStrangulation: ["strangulation", "勒", "扼", "manual"],
    hanging: ["hanging", "吊", "縊"],
    opioidOverdose: ["opioid", "fentanyl", "鴉片", "過量", "overdose"],
    coPoisoning: ["carbonmonoxide", "co", "一氧化碳"],
    fallFromHeight: ["fall", "blunt", "墜", "鈍力", "trauma"],
    drowning: ["drowning", "溺"],
    sexualHomicide: ["sexual", "strangulation", "性侵", "勒", "扼"],
    electrocution: ["electro", "electric", "電擊", "電流", "觸電"],
    burning: ["fire", "thermal", "burn", "smoke", "燒", "火", "煙", "熱"],
    methCardiac: ["meth", "amphetamine", "cardiac", "hypertensive", "安非他命", "心臟", "心律", "高血壓"],
    alcoholFall: ["alcohol", "fall", "blunt", "intracranial", "hemorrhage", "酒", "墜", "跌", "顱", "出血", "鈍力"],
    sharpForce: ["sharp", "stab", "incised", "exsanguination", "銳器", "刺", "切", "失血"],
    childAbuse: ["abuse", "battered", "abusive", "trauma", "虐", "兒虐", "受虐", "外傷"],
    drugInteraction: ["polydrug", "opioid", "benzodiazepine", "interaction", "toxicity", "藥物", "交互", "中毒", "鴉片", "鎮靜"]

  const examCount = exKeys.length;

  if (meta.needsNeck && !didFace) pathology = Math.max(20, pathology - 15);

  const toxExamined = Object.keys(examined).filter(k => k.startsWith("tox_")).length;

  if (causeHit) notes.push("死亡原因判定正確");else notes.push(`死亡原因判定有誤，正確應為「${gt.causeOfDeath}」`);

  if (meta.needsNeck && !didFace) notes.push("⚠ 未執行顏面切開術，未確認結膜點狀出血");
  if (meta.needsPelvic && !didPelvic) notes.push("⚠ 本案疑似性侵害，未執行骨盆切開術，未採集生殖道檢體");
  if (toxExamined < 2) notes.push("毒物送驗檢體不足，建議至少送驗血液與玻璃體液");
  if (decompStage >= 2) {
    notes.push("⚠ 本案屍體腐敗，屍僵屍斑已不可靠");
    if (!usedEntomology) notes.push("腐敗案件未採集昆蟲學標本，PMI 推估缺乏可靠依據");
    notes.push("注意：血中酒精可能含死後腐敗生成（artifact），不可逕認為生前飲酒");
  }

  if (meta.isChild) notes.push("兒童死亡案件須特別注意虐待性頭部外傷三聯徵與不同癒合期傷");
  notes.push(`正確證據鏈：${gt.keyEvidenceChain.join(" → ")}`);
  return {
    pathology: Math.round(pathology),
    timeEstimate: Math.round(timeScore),
    toxicology: Math.round(toxScore),
    sceneReconstruction: Math.round(sceneScore),
    overall: Math.min(100, overall),
    feedback: notes.join("。") + "。"
  };
}

      };

      return {
        ...state,
        difficulty: action.payload
      };
    case "SET_CASE":
      return {
        ...state,
        caseData: action.payload
      };
    case "SET_TAB":
      return {
        ...state,
        activeTab: action.payload
      };
    case "EXAMINE":
      return {
        ...state,
        examined: {
          ...state.examined,
          [action.payload]: true
        }
      };
    case "SET_VERDICT":
      return {
        ...state,
        verdictInput: {
          ...state.verdictInput,
          ...action.payload
        }
      };
    case "SET_SCORE":
      return {
        ...state,
        score: action.payload
      };
    case "SET_ERROR":
      return {
        ...state,
        error: action.payload
      };
    case "SET_LOADING_STEP":
      return {
        ...state,
        loadingStep: action.payload
      };
    case "RESET":
      return {
        ...initialState,
        screen: "menu"
      };
    default:
      return state;
  }
}
